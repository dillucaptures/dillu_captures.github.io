<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Private Studio | Dillu Captures</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --glass-rgb: 255, 255, 255;
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent: #0071e3;
            --ios-blur: blur(30px) saturate(200%) brightness(1.1);
        }

        body.dark {
            --bg: #000000;
            --text: #ffffff;
            --glass-rgb: 28, 28, 30;
            --glass-border: rgba(255, 255, 255, 0.15);
            --ios-blur: blur(30px) saturate(180%) brightness(0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.5s ease;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Loading Overlay */
        #loading-overlay { 
            position: fixed; inset: 0; 
            background: var(--bg); 
            z-index: 10000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass {
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            background: rgba(var(--glass-rgb), 0.7);
            border-bottom: 1px solid var(--glass-border);
        }

        header { 
            position: fixed; top: 0; width: 100%; height: 75px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; z-index: 1000; 
        }

        header h1 { font-family: 'Cinzel', serif; font-size: 16px; letter-spacing: 0.25em; }

        .header-controls { display: flex; align-items: center; gap: 20px; }

        .theme-toggle { width: 44px; height: 24px; border-radius: 20px; cursor: pointer; position: relative; background: rgba(var(--glass-rgb), 0.8); border: 1px solid var(--glass-border); }
        .toggle-circle { width: 18px; height: 18px; background: var(--text); border-radius: 50%; position: absolute; top: 2px; left: 3px; transition: 0.5s; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        body.dark .toggle-circle { left: 21px; background: #fff; color: #000; }

        .filter-nav { display: flex; justify-content: center; gap: 30px; margin-bottom: 50px; }
        .filter-btn {
            background: none; border: none; color: var(--text);
            font-family: 'Inter'; font-size: 12px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.2em;
            cursor: pointer; opacity: 0.4; transition: 0.3s;
            position: relative; padding-bottom: 8px;
        }
        .filter-btn.active { opacity: 1; }
        .filter-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%); width: 20px; height: 1px;
            background: var(--accent);
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .private-hero { padding: 160px 5% 40px; text-align: center; }
        .private-hero h2 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 8vw, 5rem); line-height: 1; margin-bottom: 15px; }

        /* Gallery Grid */
        .gallery-container { padding: 0 5% 100px; }
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); 
            gap: 30px; 
        }

        .gallery-item { 
            position: relative; 
            border-radius: 30px; 
            overflow: hidden; 
            background: rgba(var(--glass-rgb), 0.05); 
            height: 600px; 
            display: block;
        }

        .gallery-item img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            transition: 1.5s cubic-bezier(0.2, 1, 0.3, 1); 
        }

        .gallery-item:hover img { transform: scale(1.08); }

        .btn-logout { 
            padding: 10px 22px; border-radius: 50px; 
            background: var(--text); color: var(--bg); 
            border: none; font-size: 11px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.1em; 
            cursor: pointer; transition: 0.3s;
        }

        @media(max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-item { height: 450px; }
        }
    </style>
</head>
<body class="dark">

<div id="loading-overlay">
    <div style="font-family: 'Cinzel'; letter-spacing: 0.5em; font-size: 11px; opacity: 0.5;">VAULT ACCESS</div>
    <div id="status-text" style="font-family: 'Playfair Display'; font-size: 22px; margin-top: 10px;">Verifying Session...</div>
</div>

<header class="glass">
    <h1>DILLU CAPTURES</h1>
    <div class="header-controls">
        <div class="theme-toggle" id="themeBtn">
            <span class="toggle-circle"><span id="theme-icon">🌙</span></span>
        </div>
        <button class="btn-logout" id="logoutBtn">Sign Out</button>
    </div>
</header>

<main>
    <section class="private-hero">
        <p class="reveal" style="font-size: 11px; letter-spacing: 0.3em; opacity: 0.5; margin-bottom: 10px;">CLIENT EXCLUSIVE</p>
        <h2 class="reveal">The Gallery</h2>
        
        <nav class="filter-nav reveal">
            <button class="filter-btn active" data-filter="all">All Works</button>
            <button class="filter-btn" data-filter="shoots">Photography</button>
        </nav>
    </section>

    <section class="gallery-container">
        <div class="gallery-grid" id="mainGrid">
            <div class="gallery-item reveal shoots">
                <img src="Images/Kids/20240813111900_IMG_0814.webp" alt="Client Shoot">
            </div>
            <div class="gallery-item reveal shoots">
                <img src="Images/Kids/IMG_1902.webp" alt="Client Shoot">
            </div>
            <div class="gallery-item reveal shoots">
                <img src="Images/Maternity Shoot/IMG_4216.webp" alt="Client Shoot">
            </div>
        </div>
    </section>
</main>

<footer style="padding: 80px 5%; text-align: center; font-size: 10px; opacity: 0.3; letter-spacing: 0.4em;">
    SECURE STUDIO ACCESS • © 2026 DILLU CAPTURES
</footer>

<script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7_qvAe4C3lqikSgbLKSwrw3xvCh8XOx4",
        authDomain: "dillu-captures07.firebaseapp.com",
        projectId: "dillu-captures07",
        storageBucket: "dillu-captures07.firebasestorage.app",
        messagingSenderId: "710377587336",
        appId: "1:710377587336:web:9a8abc278a28bc2f9d953d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 1. AUTH GUARD
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('status-text').textContent = "Access Granted";
            setTimeout(() => {
                const overlay = document.getElementById('loading-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 800);
            }, 800);
        } else {
            window.location.href = "index.html#studio";
        }
    });

    // 2. LOGOUT
    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });

    // 3. THEME TOGGLE
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle("dark");
        document.getElementById('theme-icon').textContent = document.body.classList.contains("dark") ? "🌙" : "☀️";
    });

    // 4. FILTER LOGIC
    const filterBtns = document.querySelectorAll('.filter-btn');
    const items = document.querySelectorAll('.gallery-item');

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.getAttribute('data-filter');

            items.forEach(item => {
                if (filter === 'all' || item.classList.contains(filter)) {
                    item.style.display = 'block';
                    setTimeout(() => item.style.opacity = '1', 10);
                } else {
                    item.style.opacity = '0';
                    setTimeout(() => item.style.display = 'none', 300);
                }
            });
        });
    });

    // 5. SMOOTH SCROLL & REVEAL
    const lenis = new Lenis();
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { 
            if (entry.isIntersecting && !entry.target.classList.contains('active')) {
                entry.target.classList.add('active');
            } 
        });
    }, { threshold: 0.15 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
