<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Private Studio | Dillu Captures</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --glass-rgb: 255, 255, 255;
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent: #0071e3;
            --ios-blur: blur(30px) saturate(200%) brightness(1.1);
        }

        body.dark {
            --bg: #000000;
            --text: #ffffff;
            --glass-rgb: 28, 28, 30;
            --glass-border: rgba(255, 255, 255, 0.15);
            --ios-blur: blur(30px) saturate(180%) brightness(0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.5s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* Loading Overlay */
        #loading-overlay { 
            position: fixed; inset: 0; 
            background: var(--bg); 
            z-index: 10000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            font-family: 'Cinzel'; 
            transition: opacity 0.8s ease;
        }

        .glass {
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            background: rgba(var(--glass-rgb), 0.7);
            border-bottom: 1px solid var(--glass-border);
        }

        header { 
            position: fixed; top: 0; width: 100%; height: 75px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; z-index: 1000; 
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .private-hero { 
            padding: 180px 5% 60px; 
            text-align: center; 
            background: radial-gradient(circle at top, rgba(0,113,227,0.05) 0%, transparent 70%);
        }

        .private-hero h2 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 8vw, 5rem); line-height: 1; margin-bottom: 20px; }
        .private-hero p { opacity: 0.6; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; font-size: 12px; }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); 
            gap: 30px; 
            padding: 40px 5% 100px; 
        }

        .gallery-item { 
            position: relative; 
            border-radius: 30px; 
            overflow: hidden; 
            background: rgba(var(--glass-rgb), 0.05); 
            height: 600px; 
        }

        .gallery-item img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            transition: 1.5s cubic-bezier(0.2, 1, 0.3, 1); 
        }

        .gallery-item:hover img { transform: scale(1.05); }

        .btn-logout { 
            padding: 10px 20px; border-radius: 50px; 
            background: var(--text); color: var(--bg); 
            border: none; font-size: 11px; font-weight: 600; 
            text-transform: uppercase; letter-spacing: 0.1em; 
            cursor: pointer; transition: 0.3s;
        }
        .btn-logout:hover { opacity: 0.8; transform: scale(0.95); }

        @media(max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-item { height: 450px; }
        }
    </style>
</head>
<body class="dark"> <!-- Defaulting to dark for studio feel -->

<div id="loading-overlay">
    <div style="letter-spacing: 0.5em; font-size: 14px;">AUTHENTICATING</div>
    <div style="width: 100px; height: 1px; background: var(--text); margin-top: 20px; opacity: 0.2;"></div>
</div>

<header class="glass">
    <h1 style="font-family:'Cinzel'; font-size: 14px; letter-spacing: 0.3em;">DILLU CAPTURES</h1>
    <button class="btn-logout" id="logoutBtn">Sign Out</button>
</header>

<main>
    <section class="private-hero">
        <p class="reveal">Exclusive Client Access</p>
        <h2 class="reveal">Your Collection</h2>
        <div class="reveal" style="width: 40px; height: 2px; background: var(--accent); margin: 30px auto;"></div>
    </section>

    <section class="gallery-grid">
        <!-- Image 1 -->
        <div class="gallery-item reveal">
            <img src="Images/Kids/20240813111900_IMG_0814.webp" loading="lazy">
        </div>
        
        <!-- Image 2 -->
        <div class="gallery-item reveal">
            <img src="Images/Kids/IMG_1902.webp" loading="lazy">
        </div>

        <!-- Add more Images/items here using the same structure -->
    </section>
</main>

<footer style="padding: 100px 5%; text-align: center; font-size: 10px; opacity: 0.4; letter-spacing: 0.3em;">
    SECURE STUDIO LINK • © 2026 DILLU CAPTURES
</footer>

<!-- Smooth Scroll Engine -->
<script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7_qvAe4C3lqikSgbLKSwrw3xvCh8XOx4",
        authDomain: "dillu-captures07.firebaseapp.com",
        projectId: "dillu-captures07",
        storageBucket: "dillu-captures07.firebasestorage.app",
        messagingSenderId: "710377587336",
        appId: "1:710377587336:web:9a8abc278a28bc2f9d953d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 1. AUTH GUARD
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Smoothly remove overlay
            const overlay = document.getElementById('loading-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 800);
        } else {
            window.location.href = "index.html#studio";
        }
    });

    // 2. LOGOUT
    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });

    // 3. SMOOTH SCROLL (Lenis)
    const lenis = new Lenis();
    function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    // 4. REVEAL ANIMATIONS
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
