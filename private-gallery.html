<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Private Studio | Dillu Captures</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --glass-rgb: 255, 255, 255;
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent: #0071e3;
            --ios-blur: blur(30px) saturate(200%) brightness(1.1);
        }

        body.dark {
            --bg: #000000;
            --text: #ffffff;
            --glass-rgb: 28, 28, 30;
            --glass-border: rgba(255, 255, 255, 0.15);
            --ios-blur: blur(30px) saturate(180%) brightness(0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.5s ease;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Authentication Overlay */
        #loading-overlay { 
            position: fixed; inset: 0; 
            background: var(--bg); 
            z-index: 10000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass {
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            background: rgba(var(--glass-rgb), 0.7);
            border-bottom: 1px solid var(--glass-border);
        }

        header { 
            position: fixed; top: 0; width: 100%; height: 75px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; z-index: 1000; 
        }

        header h1 { font-family: 'Cinzel', serif; font-size: 16px; letter-spacing: 0.25em; }

        .header-controls { display: flex; align-items: center; gap: 20px; }

        .theme-toggle { width: 44px; height: 24px; border-radius: 20px; cursor: pointer; position: relative; background: rgba(var(--glass-rgb), 0.8); border: 1px solid var(--glass-border); }
        .toggle-circle { width: 18px; height: 18px; background: var(--text); border-radius: 50%; position: absolute; top: 2px; left: 3px; transition: 0.5s; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        body.dark .toggle-circle { left: 21px; background: #fff; color: #000; }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .private-hero { padding: 160px 5% 40px; text-align: center; }
        .private-hero h2 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 8vw, 5rem); line-height: 1; margin-bottom: 15px; }

        /* Filter Tabs */
        .filter-nav { display: flex; justify-content: center; gap: 30px; margin-bottom: 50px; }
        .filter-btn {
            background: none; border: none; color: var(--text);
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.2em; cursor: pointer; opacity: 0.4; transition: 0.3s;
        }
        .filter-btn.active { opacity: 1; }

        /* AI MASONRY ENGINE STYLES */
        .gallery-container { padding: 0 5% 100px; width: 100%; }
        
        /* The Magic: CSS Columns for AI-style flow */
        .ai-masonry-grid {
            columns: 3 350px;
            column-gap: 25px;
            width: 100%;
        }

        .gallery-item { 
            break-inside: avoid;
            margin-bottom: 25px;
            position: relative; 
            border-radius: 24px; 
            overflow: hidden; 
            background: rgba(var(--glass-rgb), 0.05); 
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gallery-item img { 
            width: 100%; 
            display: block;
            height: auto;
            transition: 1.5s cubic-bezier(0.2, 1, 0.3, 1); 
        }

        .gallery-item:hover { transform: translateY(-10px); }
        .gallery-item:hover img { transform: scale(1.05); }

        /* AI Badge */
        .ai-label {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(var(--glass-rgb), 0.2);
            backdrop-filter: blur(10px);
            padding: 6px 14px; border-radius: 40px;
            font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
            color: var(--text); border: 1px solid var(--glass-border);
            pointer-events: none; opacity: 0; transition: 0.4s;
        }
        .gallery-item:hover .ai-label { opacity: 1; }

        .btn-logout { 
            padding: 10px 22px; border-radius: 50px; 
            background: var(--text); color: var(--bg); 
            border: none; font-size: 10px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.1em; 
            cursor: pointer; transition: 0.3s;
        }

        @media(max-width: 768px) {
            .ai-masonry-grid { columns: 1; }
            .private-hero { padding-top: 120px; }
        }
    </style>
</head>
<body class="dark">

<div id="loading-overlay">
    <div style="font-family: 'Cinzel'; letter-spacing: 0.6em; font-size: 10px; opacity: 0.5;">Dillu Captures AI</div>
    <div id="status-text" style="font-family: 'Playfair Display'; font-size: 22px; margin-top: 10px;">Arranging Collection...</div>
</div>

<header class="glass">
    <h1>DILLU CAPTURES</h1>
    <div class="header-controls">
        <div class="theme-toggle" id="themeBtn">
            <span class="toggle-circle"><span id="theme-icon">🌙</span></span>
        </div>
        <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
</header>

<main>
    <section class="private-hero">
        <p class="reveal" style="font-size: 10px; letter-spacing: 0.4em; opacity: 0.5; margin-bottom: 10px;">INTELLIGENT CURATION</p>
        <h2 class="reveal">The Vault</h2>
        
        <nav class="filter-nav reveal">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="shoots">Photography</button>
            <button class="filter-btn" data-filter="ai">AI Art</button>
        </nav>
    </section>

    <section class="gallery-container">
        <!-- AI Masonry Grid -->
        <div class="ai-masonry-grid" id="mainGrid">
            
            <!-- Item 1 (Photography) -->
            <div class="gallery-item reveal shoots">
                <img src="Images/Kids/20240813111900_IMG_0814.webp" alt="Client Shoot">
                <div class="ai-label">PHOTO-ID: 814</div>
            </div>
            
            <!-- Item 2 (AI Art) -->
            <div class="gallery-item reveal ai">
                <img src="https://images.unsplash.com/photo-1675271591211-126ad94e495d?q=80&w=2070&auto=format&fit=crop" alt="AI Generation">
                <div class="ai-label">AI_GENERATIVE_01</div>
            </div>

            <!-- Item 3 (Photography - Portrait) -->
            <div class="gallery-item reveal shoots">
                <img src="Images/Kids/IMG_1902.webp" alt="Client Shoot">
                <div class="ai-label">PHOTO-ID: 1902</div>
            </div>

            <!-- Item 4 (AI Art) -->
            <div class="gallery-item reveal ai">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop" alt="AI Generation">
                <div class="ai-label">AI_GENERATIVE_02</div>
            </div>

            <!-- Item 5 (Photography) -->
            <div class="gallery-item reveal shoots">
                <img src="Images/Maternity Shoot/IMG_4216.webp" alt="Client Shoot">
                <div class="ai-label">PHOTO-ID: 4216</div>
            </div>

            <!-- Extra Placeholder for AI feel -->
            <div class="gallery-item reveal ai">
                <img src="https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1974&auto=format&fit=crop" alt="AI Generation">
                <div class="ai-label">AI_GENERATIVE_03</div>
            </div>
        </div>
    </section>
</main>

<footer style="padding: 60px 5%; text-align: center; font-size: 9px; opacity: 0.3; letter-spacing: 0.4em;">
    AI-POWERED CURATION • © 2026 DILLU CAPTURES
</footer>

<script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7_qvAe4C3lqikSgbLKSwrw3xvCh8XOx4",
        authDomain: "dillu-captures07.firebaseapp.com",
        projectId: "dillu-captures07",
        storageBucket: "dillu-captures07.firebasestorage.app",
        messagingSenderId: "710377587336",
        appId: "1:710377587336:web:9a8abc278a28bc2f9d953d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // AUTH & AI INTRO
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('status-text').textContent = "Curation Complete";
            setTimeout(() => {
                const overlay = document.getElementById('loading-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 800);
            }, 1200);
        } else {
            window.location.href = "index.html#studio";
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });

    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle("dark");
        document.getElementById('theme-icon').textContent = document.body.classList.contains("dark") ? "🌙" : "☀️";
    });

    // AI FILTERING SYSTEM
    const filterBtns = document.querySelectorAll('.filter-btn');
    const items = document.querySelectorAll('.gallery-item');

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const filter = btn.getAttribute('data-filter');

            items.forEach(item => {
                item.style.transition = '0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                if (filter === 'all' || item.classList.contains(filter)) {
                    item.style.opacity = '1';
                    item.style.transform = 'scale(1)';
                    item.style.pointerEvents = 'all';
                    item.style.position = 'relative';
                    item.style.visibility = 'visible';
                } else {
                    item.style.opacity = '0';
                    item.style.transform = 'scale(0.95)';
                    item.style.pointerEvents = 'none';
                    // We don't use display:none to prevent masonry jumps
                    item.style.position = 'absolute';
                    item.style.visibility = 'hidden';
                }
            });
        });
    });

    const lenis = new Lenis();
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
