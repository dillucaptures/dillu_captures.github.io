<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
:root{
  --bg:#0f0f0f;
  --text:#fff;
  --accent:#c9a96e;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter';
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ================= HEADER ================= */
header{
  position:fixed;
  width:100%;
  top:0;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  backdrop-filter:blur(20px);
  z-index:1000;
}

header h1{font-family:'Playfair Display'}

nav a{
  margin-left:25px;
  color:#fff;
  text-decoration:none;
}

/* ================= HERO ================= */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 60px;
  position:relative;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Images/1776695215852.webp') center/cover no-repeat;
  transform:scale(1.1);
  animation:zoom 15s infinite alternate ease-in-out;
}

@keyframes zoom{
  from{transform:scale(1.1)}
  to{transform:scale(1.25)}
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at left,rgba(0,0,0,0.8),transparent);
}

.hero-text{
  position:relative;
  max-width:500px;
}

.hero-text h2{
  font-family:'Playfair Display';
  font-size:60px;
  animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(50px)}
  to{opacity:1;transform:translateY(0)}
}

/* ================= SECTIONS ================= */
section{padding:120px 60px}

/* ================= MASONRY ================= */
.gallery{
  column-count:3;
  column-gap:20px;
}

.gallery img{
  width:100%;
  margin-bottom:20px;
  border-radius:15px;
  cursor:pointer;
  transition:.4s;
  opacity:0;
  transform:translateY(40px);
}

.gallery img.show{
  opacity:1;
  transform:translateY(0);
}

.gallery img:hover{
  transform:scale(1.03);
  filter:brightness(.85);
}

/* ================= POPUP ================= */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
  z-index:2000;
}

.popup.active{
  opacity:1;
  pointer-events:all;
}

.popup img{
  max-width:90%;
  max-height:85%;
  border-radius:20px;
  animation:zoomIn .4s ease;
}

@keyframes zoomIn{
  from{transform:scale(.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

.close{
  position:absolute;
  top:30px;
  right:40px;
  font-size:30px;
  cursor:pointer;
}

/* ================= BUTTON ================= */
.btn{
  padding:14px 28px;
  border-radius:30px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  text-decoration:none;
  display:inline-block;
  margin:10px;
}

/* ================= MOBILE ================= */
@media(max-width:900px){
  .gallery{column-count:2}
}

@media(max-width:600px){
  .gallery{column-count:1}
  header{padding:15px 20px}
  section{padding:100px 20px}
}

</style>
</head>

<body>

<header>
  <h1>Dillu Captures</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#booking">Book</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h2>Capturing Timeless Moments</h2>
    <p>Luxury photography crafted with emotion.</p>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2>Gallery</h2>

  <div class="gallery">
    <img loading="lazy" src="Images/Kids/20240813111900_IMG_0814.webp">
    <img loading="lazy" src="Images/Kids/IMG_1902.webp">
    <img loading="lazy" src="Images/Kids/IMG_5197 (1).webp">
    <img loading="lazy" src="Images/Kids/IMG_5332.webp">
    <img loading="lazy" src="Images/Maternity Shoot/20240719132714_IMG_0511.webp">
    <img loading="lazy" src="Images/Maternity Shoot/IMG_4216.webp">
    <img loading="lazy" src="Images/Maternity Shoot/IMG_4265.webp">
    <img loading="lazy" src="Images/Maternity Shoot/IMG_4363.webp">
    <img loading="lazy" src="Images/Temples & Culture/20230609184601_IMG_7346.webp">
    <img loading="lazy" src="Images/Temples & Culture/20231001121437_IMG_8556.webp">
  </div>
</section>

<!-- BOOKING -->
<section id="booking">
  <h2>Book a Shoot</h2>
  <a class="btn" href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Photoshoot Booking" target="_blank">
    Book via Google Calendar
  </a>
</section>

<!-- INSTAGRAM -->
<section>
  <h2>Instagram</h2>
  <iframe src="https://www.instagram.com/dillu_captures/embed" width="100%" height="500"></iframe>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <span class="close" onclick="closePopup()">✕</span>
  <img id="popup-img">
</div>

<script>

/* ================= POPUP ================= */
const images = document.querySelectorAll(".gallery img");
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popup-img");

images.forEach(img=>{
  img.addEventListener("click",()=>{
    popup.classList.add("active");
    popupImg.src = img.src;
  });
});

function closePopup(){
  popup.classList.remove("active");
}

/* CLICK OUTSIDE */
popup.addEventListener("click",(e)=>{
  if(e.target!==popupImg){
    closePopup();
  }
});

/* ESC CLOSE */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Escape") closePopup();
});

/* ================= SCROLL ANIMATION ================= */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
},{threshold:0.1});

document.querySelectorAll(".gallery img").forEach(img=>{
  observer.observe(img);
});

</script>

</body>
</html>
