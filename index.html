<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures SaaS</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:#fff;text-align:center}
button{padding:10px 20px;margin:10px;border:none;border-radius:8px;cursor:pointer}
input{padding:10px;margin:5px;border-radius:6px;border:none}
#loginPage,#dashboard,#adminPanel{display:none}
img{width:200px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h2>Login</h2>
<button onclick="googleLogin()">Google Login</button>

<div id="recaptcha"></div>
<input id="phone" placeholder="+91XXXXXXXXXX">
<button onclick="sendOTP()">Send OTP</button>
<input id="otp" placeholder="OTP">
<button onclick="verifyOTP()">Verify</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Client Dashboard</h2>
<button onclick="logout()">Logout</button>
<div id="gallery"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<h2>Admin Panel</h2>
<button onclick="logout()">Logout</button>

<input type="file" id="upload" multiple>
<input id="clientId" placeholder="Client UID">
<button onclick="uploadPhotos()">Upload</button>
</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// ================= LOGIN =================

function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha');

function sendOTP(){
  const phone = document.getElementById("phone").value;

  auth.signInWithPhoneNumber(phone, recaptchaVerifier)
    .then(res => window.confirmationResult = res);
}

function verifyOTP(){
  const code = document.getElementById("otp").value;

  confirmationResult.confirm(code);
}

// ================= AUTH STATE =================

auth.onAuthStateChanged(async user => {

  if(!user){
    show("loginPage");
    return;
  }

  // create user if not exists
  const ref = db.collection("users").doc(user.uid);
  const doc = await ref.get();

  if(!doc.exists){
    await ref.set({
      role: "client" // change manually to admin in Firebase
    });
  }

  const role = (await ref.get()).data().role;

  if(role === "admin"){
    show("adminPanel");
  } else {
    show("dashboard");
    loadGallery();
  }

});

// ================= SHOW UI =================

function show(id){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("dashboard").style.display="none";
  document.getElementById("adminPanel").style.display="none";

  document.getElementById(id).style.display="block";
}

// ================= ADMIN UPLOAD =================

async function uploadPhotos(){

  const files = document.getElementById("upload").files;
  const clientId = document.getElementById("clientId").value;

  let urls=[];

  for(let file of files){
    const ref = storage.ref("photos/"+file.name);
    await ref.put(file);

    const url = await ref.getDownloadURL();
    urls.push(url);
  }

  await db.collection("galleries").add({
    clientId: clientId,
    images: urls
  });

  alert("Uploaded!");
}

// ================= CLIENT LOAD =================

async function loadGallery(){

  const user = auth.currentUser;
  const snap = await db.collection("galleries")
    .where("clientId","==",user.uid)
    .get();

  const gallery = document.getElementById("gallery");
  gallery.innerHTML="";

  snap.forEach(doc=>{
    doc.data().images.forEach(img=>{
      const i = document.createElement("img");
      i.src = img;
      gallery.appendChild(i);
    });
  });

}

// ================= LOGOUT =================

function logout(){
  auth.signOut();
}

</script>

</body>
</html>
