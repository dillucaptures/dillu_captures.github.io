<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
:root{
  --bg:#0f0f0f;
  --text:#fff;
  --glass:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ===== CINEMATIC INTRO ===== */
.intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeOut 1.5s ease 2s forwards;
}
.intro h1{
  font-family:Playfair Display;
  font-size:50px;
  letter-spacing:3px;
  animation:zoomIn 2s ease forwards;
}

@keyframes zoomIn{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

@keyframes fadeOut{
  to{opacity:0; visibility:hidden;}
}

/* ===== NAV ===== */
header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:1000;
}

nav a{
  margin-left:20px;
  color:#fff;
  text-decoration:none;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:60px;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  right:0;
  width:50%;
  height:100%;
  background:url('Images/1776695215852.webp') center/cover;
  opacity:0.7;
}

.hero-text{
  max-width:500px;
  z-index:2;
}

.hero h2{
  font-size:52px;
  font-family:Playfair Display;
}

/* ===== SCROLL ANIMATION ===== */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.gallery img{
  width:100%;
  border-radius:15px;
  transition:.4s;
  cursor:pointer;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* ===== VIEWER ===== */
.viewer{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
}

.viewer img{
  max-width:90%;
  max-height:90%;
}

/* ===== BUTTON ===== */
.btn{
  padding:14px 28px;
  border-radius:30px;
  background:var(--glass);
  color:#fff;
  text-decoration:none;
  display:inline-block;
  margin:10px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }
  .hero::after{
    width:100%;
    height:50%;
  }
}

</style>
</head>

<body>

<div class="intro">
  <h1>Dillu Captures</h1>
</div>

<header>
  <h2>Dillu</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-text fade">
    <h2>Capturing Timeless Luxury</h2>
    <p>Premium storytelling through photography.</p>
  </div>
</section>

<section id="gallery">
  <h2 style="text-align:center">Gallery</h2>
  <div class="gallery fade">

    <img src="Images/Kids/IMG_1902.webp">
    <img src="Images/Kids/IMG_5332.webp">
    <img src="Images/Maternity Shoot/IMG_4216.webp">
    <img src="Images/Maternity Shoot/IMG_4265.webp">
    <img src="Images/Temples & Culture/IMG_3390.webp">
    <img src="Images/Temples & Culture/IMG_3037.webp">

  </div>
</section>

<section id="contact" class="fade" style="text-align:center">
  <h2>Book a Session</h2>
  <a class="btn" href="https://wa.me/919700034138">WhatsApp</a>
  <a class="btn" href="https://www.instagram.com/dillu_captures/">Instagram</a>
</section>

<div class="viewer" id="viewer">
  <img id="viewerImg">
</div>

<script>

/* ===== SCROLL ANIMATION ===== */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".fade").forEach(el=>{
  observer.observe(el);
});

/* ===== IMAGE VIEWER ===== */
const viewer=document.getElementById("viewer");
const viewerImg=document.getElementById("viewerImg");

document.querySelectorAll(".gallery img").forEach(img=>{
  img.onclick=()=>{
    viewer.style.display="flex";
    viewerImg.src=img.src;
  };
});

viewer.onclick=()=>viewer.style.display="none";

</script>

</body>
</html>
