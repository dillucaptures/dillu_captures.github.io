<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Inter&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Inter;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.hero h1{
  font-family:Playfair Display;
  font-size:50px;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1s forwards;
}
@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:6px;
  padding:8px;
}
.gallery img{
  width:100%;
  border-radius:12px;
  cursor:pointer;
}

/* ===== VIEWER ===== */
.viewer{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* ===== LIVE BLUR BACKGROUND ===== */
.bg-blur{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(40px) brightness(0.4);
  transform:scale(1.2);
  transition:.6s;
}

/* ===== IMAGE ===== */
.viewer img{
  position:relative;
  max-width:90%;
  max-height:90%;
  z-index:2;
  transition:transform .2s ease;
}

/* ===== GLASS BAR ===== */
.topbar{
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  transition:.3s;
}

</style>
</head>

<body>

<div class="hero">
  <h1>Dillu Captures</h1>
</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
  <div class="bg-blur" id="bg"></div>
  <div class="topbar" id="bar">Swipe • Drag • Tap</div>
  <img id="img">
</div>

<script>

/* ===== IMAGES ===== */
const images=[
"Images/Kids/IMG_1902.webp",
"Images/Kids/IMG_5332.webp",
"Images/Maternity Shoot/IMG_4216.webp",
"Images/Maternity Shoot/IMG_4265.webp",
"Images/Temples & Culture/IMG_3390.webp",
"Images/Temples & Culture/IMG_3037.webp"
];

const gallery=document.getElementById("gallery");

/* ===== LOAD GRID ===== */
images.forEach((src,i)=>{
  const img=document.createElement("img");
  img.src=src;
  img.onclick=()=>openViewer(i);
  gallery.appendChild(img);
});

/* ===== VIEWER ===== */
let current=0;
const viewer=document.getElementById("viewer");
const viewerImg=document.getElementById("img");
const bg=document.getElementById("bg");

function openViewer(i){
  current=i;
  viewer.style.display="flex";
  update();

  viewerImg.style.transform="scale(0.9)";
  setTimeout(()=>viewerImg.style.transform="scale(1)",50);

  vibrate(10);
}

function update(){
  viewerImg.src=images[current];
  bg.style.backgroundImage=`url(${images[current]})`;
}

/* ===== HAPTIC ===== */
function vibrate(ms){
  if(navigator.vibrate) navigator.vibrate(ms);
}

/* ===== SWIPE PHYSICS ===== */
let startX=0, velocity=0, lastX=0, time=0;

viewer.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  lastX=startX;
  time=Date.now();
});

viewer.addEventListener("touchmove",e=>{
  let x=e.touches[0].clientX;
  let dx=x-startX;

  let now=Date.now();
  velocity=(x-lastX)/(now-time);

  lastX=x;
  time=now;

  viewerImg.style.transform=`translateX(${dx}px) scale(0.95)`;
});

viewer.addEventListener("touchend",()=>{
  let momentum=velocity*300;

  if(momentum<-50){
    next();
  } else if(momentum>50){
    prev();
  }

  viewerImg.style.transform="";
});

/* ===== NAV ===== */
function next(){
  current=(current+1)%images.length;
  update();
  vibrate(5);
}
function prev(){
  current=(current-1+images.length)%images.length;
  update();
  vibrate(5);
}

/* ===== TAP CLOSE ===== */
viewer.addEventListener("click",()=>{
  viewer.style.display="none";
});

/* ===== SCROLL GLASS EFFECT ===== */
window.addEventListener("scroll",()=>{
  const bar=document.getElementById("bar");
  let blur=Math.min(window.scrollY/50,20);
  bar.style.backdropFilter=`blur(${blur}px)`;
});

</script>

</body>
</html>
