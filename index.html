<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== ROOT ===== */
:root {
  --bg: #ffffff;
  --text: #111;
  --accent: #d4af37;
  --glass: rgba(255,255,255,0.6);
}

body.dark {
  --bg: #0f0f0f;
  --text: #f5f5f5;
  --glass: rgba(255,255,255,0.08);
}

/* GLOBAL */
* {margin:0; padding:0; box-sizing:border-box;}
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: .4s;
}

/* ===== INTRO ===== */
.intro {
  position:fixed;
  width:100%;
  height:100%;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.intro-text {
  font-size:44px;
  font-family:'Playfair Display';
  animation:fadeIn 1.5s forwards;
}
@keyframes fadeIn {
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1;}
}
.intro.hide {
  animation:fadeOut 1s forwards;
}
@keyframes fadeOut {
  to{opacity:0; visibility:hidden;}
}

/* ===== NAV ===== */
header {
  position:fixed;
  width:100%;
  top:0;
  padding:18px 60px;
  display:flex;
  justify-content:space-between;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:1000;
}

nav a {
  margin-left:25px;
  text-decoration:none;
  color:var(--text);
  position:relative;
}

nav a::after {
  content:"";
  position:absolute;
  bottom:-5px;
  left:0;
  width:0;
  height:2px;
  background:var(--accent);
  transition:.3s;
}
nav a:hover::after {
  width:100%;
}

/* THEME SWITCH */
.theme-toggle {
  width:52px;
  height:26px;
  border-radius:30px;
  background:var(--glass);
  position:relative;
  cursor:pointer;
  margin-left:20px;
}
.toggle-circle {
  width:20px;
  height:20px;
  border-radius:50%;
  background:#111;
  position:absolute;
  top:3px;
  left:3px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:11px;
  color:#fff;
  transition:.3s;
}
body.dark .toggle-circle {
  left:29px;
  background:#fff;
  color:#111;
}

/* ===== HERO ===== */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 60px;
  position:relative;
}
.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to right, rgba(0,0,0,0.5), transparent),
             url('Images/1776695215852.webp') center/cover;
  z-index:-1;
}
.hero-text {
  max-width:500px;
  color:#fff;
}
.hero h2 {
  font-size:54px;
  font-family:'Playfair Display';
}
.hero p {
  margin-top:10px;
  opacity:0.8;
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:14px 28px;
  border-radius:30px;
  margin-top:20px;
  background:var(--accent);
  color:#000;
  text-decoration:none;
  transition:.3s;
}
.btn:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* ===== SECTIONS ===== */
section {
  padding:120px 60px;
}

.about {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
}
.about img {
  width:100%;
  border-radius:20px;
}

/* ===== GALLERY ===== */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}
.gallery div {
  overflow:hidden;
  border-radius:15px;
  position:relative;
}
.gallery img {
  width:100%;
  transition:.5s;
}
.gallery div:hover img {
  transform:scale(1.1);
}

/* ===== CONTACT ===== */
.calendar {
  max-width:420px;
  margin:40px auto;
}

/* ===== ANIMATION ===== */
.reveal {
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.reveal.active {
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:768px){
  header {padding:15px;}
  .hero {padding:20px;}
  .about {grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="intro" id="intro">
  <div class="intro-text">Dillu Captures</div>
</div>

<header>
  <h1>Dillu Captures</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>

    <span class="theme-toggle" onclick="toggleTheme()">
      <div class="toggle-circle" id="toggleBtn">☀️</div>
    </span>
  </nav>
</header>

<section class="hero">
  <div class="hero-text reveal">
    <h2>Capturing Timeless Moments</h2>
    <p>Luxury photography crafted with emotion.</p>
    <a class="btn" href="#contact">Book Now</a>
  </div>
</section>

<section id="about" class="about reveal">
  <img src="Images/IMG_1164.webp">
  <div>
    <h2>About Me</h2>
    <p>Professional photographer creating cinematic memories and emotional storytelling.</p>
  </div>
</section>

<section id="gallery">
  <h2 style="margin-bottom:30px">Gallery</h2>
  <div class="gallery reveal">
    <div><img src="Images/Kids/IMG_1902.webp"></div>
    <div><img src="Images/Maternity Shoot/IMG_4216.webp"></div>
    <div><img src="Images/Temples & Culture/IMG_3234.webp"></div>
  </div>
</section>

<section id="contact" class="reveal">
  <h2>Book a Slot</h2>
  <a class="btn" href="https://wa.me/919700034138" target="_blank">WhatsApp</a>
</section>

<script>

/* INTRO */
window.onload = () => {
  setTimeout(()=> document.getElementById("intro").classList.add("hide"),1500);

  // load theme
  if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
    document.getElementById("toggleBtn").textContent="🌙";
  }
};

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("dark");

  const isDark = document.body.classList.contains("dark");
  document.getElementById("toggleBtn").textContent = isDark ? "🌙" : "☀️";

  localStorage.setItem("theme", isDark ? "dark" : "light");
}

/* SCROLL REVEAL */
window.addEventListener("scroll", () => {
  document.querySelectorAll(".reveal").forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight - 80){
      el.classList.add("active");
    }
  });
});

</script>

</body>
</html>
