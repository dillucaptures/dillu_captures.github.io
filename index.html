<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== ROOT ===== */
:root {
  --bg:#ffffff;
  --text:#111;
  --muted:#777;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== SCROLL STORY ===== */
.story-section{
  height:200vh;
  position:relative;
}

.story-content{
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.story-content h2{
  font-family:'Playfair Display';
  font-size:48px;
  max-width:700px;
  transition:opacity .6s;
}

/* ===== BEFORE AFTER ===== */
.compare{
  position:relative;
  max-width:800px;
  margin:100px auto;
}

.compare img{
  width:100%;
  display:block;
}

.after{
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.slider{
  position:absolute;
  top:0;
  bottom:0;
  left:50%;
  width:3px;
  background:#fff;
  cursor:ew-resize;
}

/* ===== INSTAGRAM GRID ===== */
.insta{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  padding:60px;
}

.insta img{
  width:100%;
  border-radius:10px;
}

/* ===== BOOKING ===== */
.booking{
  padding:100px;
  max-width:600px;
  margin:auto;
}

.booking input, .booking button{
  width:100%;
  padding:12px;
  margin:10px 0;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  background:url('Images/1776695215852.webp') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.hero h1{
  font-size:60px;
  font-family:'Playfair Display';
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Dillu Captures</h1>
</section>

<!-- APPLE STORY -->
<section class="story-section">
  <div class="story-content">
    <h2 id="storyText">Every photo begins with a story.</h2>
  </div>
</section>

<!-- BEFORE AFTER -->
<section>
  <div class="compare" id="compare">
    <img src="Images/Kids/IMG_1902.webp">
    <div class="after" id="after">
      <img src="Images/Kids/IMG_5332.webp">
    </div>
    <div class="slider" id="slider"></div>
  </div>
</section>

<!-- INSTAGRAM -->
<section>
  <h2 style="text-align:center">Latest Instagram</h2>
  <div class="insta" id="instaFeed"></div>
</section>

<!-- BOOKING -->
<section class="booking">
  <h2>Book a Shoot</h2>

  <input type="date" id="date">
  <input type="time" id="time">

  <button onclick="book()">Book Now</button>
</section>

<script>

/* ===== STORY TEXT CHANGE ===== */
const storyText=document.getElementById("storyText");

window.addEventListener("scroll",()=>{
  const scroll=window.scrollY;

  if(scroll<500){
    storyText.innerText="Every photo begins with a story.";
  }else if(scroll<1000){
    storyText.innerText="Light creates emotion.";
  }else{
    storyText.innerText="Emotion creates timeless memories.";
  }
});

/* ===== BEFORE AFTER SLIDER ===== */
const slider=document.getElementById("slider");
const after=document.getElementById("after");

slider.onmousedown=(e)=>{
  document.onmousemove=(e)=>{
    let rect=slider.parentElement.getBoundingClientRect();
    let x=e.clientX - rect.left;

    after.style.width=x+"px";
    slider.style.left=x+"px";
  }
  document.onmouseup=()=>document.onmousemove=null;
};

/* ===== INSTAGRAM AUTO SYNC ===== */
/* Replace YOUR_TOKEN */
fetch("https://graph.instagram.com/me/media?fields=id,media_url&access_token=YOUR_TOKEN")
.then(res=>res.json())
.then(data=>{
  let html="";
  data.data.slice(0,6).forEach(post=>{
    html+=`<img src="${post.media_url}">`;
  });
  document.getElementById("instaFeed").innerHTML=html;
});

/* ===== BOOKING ===== */
function book(){
  const date=document.getElementById("date").value;
  const time=document.getElementById("time").value;

  alert("Booking request sent for "+date+" at "+time);

  /* Later connect to backend */
}

</script>

</body>
</html>
