<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dillu Captures | Luxury Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --glass-rgb: 255, 255, 255;
      --glass-border: rgba(0, 0, 0, 0.1);
      --accent: #0071e3;
      --ios-blur: blur(30px) saturate(200%) brightness(1.1);
    }
    body.dark {
      --bg: #000000;
      --text: #ffffff;
      --glass-rgb: 28, 28, 30;
      --glass-border: rgba(255, 255, 255, 0.15);
      --ios-blur: blur(30px) saturate(180%) brightness(0.8);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #fdfdfd, #f0f0f5);
      color: var(--text);
      transition: background-color 0.5s ease;
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: fixed; top: 0; width: 100%; height: 75px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 5%; z-index: 1000;
      backdrop-filter: var(--ios-blur);
      background: rgba(var(--glass-rgb), 0.6);
      border-bottom: 1px solid var(--glass-border);
    }
    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 18px; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase;
    }
    nav { display: flex; gap: 30px; }
    nav a {
      text-decoration: none; color: var(--text);
      font-size: 12px; font-weight: 500; opacity: 0.7;
      transition: 0.3s; text-transform: uppercase;
    }
    nav a:hover { opacity: 1; color: var(--accent); }
    .hero {
      height: 100vh; display: flex; align-items: center;
      justify-content: center; text-align: center;
      background: url('luxury-photo.jpg') center/cover no-repeat;
      position: relative; color: #fff;
    }
    .hero::after {
      content: ""; position: absolute; inset: 0;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(5px);
    }
    .hero h2 {
      position: relative; font-size: 3.5rem; font-weight: 700;
      background: linear-gradient(90deg, #ffffff, #d1d1d6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .section { padding: 120px 5%; max-width: 1200px; margin: auto; }
    .section-title {
      font-family: 'Playfair Display'; font-size: 56px;
      text-align: center; margin-bottom: 60px;
      background: linear-gradient(90deg, #111, #555);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .gallery {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
    }
    .gallery-item {
      position: relative; border-radius: 25px; overflow: hidden;
      backdrop-filter: var(--ios-blur);
      background: rgba(var(--glass-rgb), 0.25);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: transform 0.5s ease, box-shadow 0.5s ease;
    }
    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1);
    }
    .gallery-item:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    }
    .gallery-item:hover img { transform: scale(1.08); }
    .btn {
      display: inline-block; padding: 18px 40px; border-radius: 50px;
      background: var(--accent); color: #fff; text-decoration: none;
      font-weight: 600; font-size: 13px; transition: 0.4s ease;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .btn:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    footer {
      backdrop-filter: var(--ios-blur);
      background: rgba(var(--glass-rgb), 0.6);
      border-top: 1px solid var(--glass-border);
      text-align: center; padding: 2rem; font-size: 0.9rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>DILLU CAPTURES</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">The Artist</a>
      <a href="#gallery">Works</a>
      <a href="#contact">Book</a>
    </nav>
  </header>

  <section class="hero" id="home">
    <h2>Luxury Photography Redefined</h2>
  </section>

  <section id="gallery" class="section">
    <h2 class="section-title">Curated Works</h2>
    <div class="gallery">
      <div class="gallery-item"><img src="Images/Kids/IMG_1902.webp" alt="Portrait"></div>
      <div class="gallery-item"><img src="Images/Maternity Shoot/IMG_4216.webp" alt="Maternity"></div>
      <div class="gallery-item"><img src="Images/Temples & Culture/IMG_7346.webp" alt="Culture"></div>
      <div class="gallery-item"><img src="Images/Kids/IMG_5332.webp" alt="Kids"></div>
    </div>
  </section>

  <section id="contact" class="section" style="text-align:center;">
    <h2 class="section-title">Reserve a Session</h2>
    <a class="btn" href="https://wa.me/919700034138" target="_blank">WhatsApp</a>
    <a class="btn" href="https://www.instagram.com/dillu_captures/" target="_blank">Instagram</a>
  </section>

  <footer>
    © 2026 DILLU CAPTURES | Cinematic Excellence <br>
    Follow us on <a href="#">Instagram</a> & <a href="#">Facebook</a>
  </footer>
</body>
</html>
