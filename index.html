<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Dillu Captures | Luxury Photography</title>

    <!-- Typography: Inter for that sleek system feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --glass-rgb: 255, 255, 255;
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent: #0071e3;
            --ios-blur: blur(30px) saturate(200%) brightness(1.1);
        }

        body.dark {
            --bg: #000000;
            --text: #ffffff;
            --glass-rgb: 28, 28, 30;
            --glass-border: rgba(255, 255, 255, 0.15);
            --ios-blur: blur(30px) saturate(180%) brightness(0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease;
        }

        /* PERFORMANCE FIX: Hardware Acceleration for smooth scrolling */
        .reveal, .gallery img, .glass {
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        /* REVEAL ANIMATION */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* ================= iOS 26 GLASS UI ================= */
        .glass {
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            background: rgba(var(--glass-rgb), 0.6);
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        /* ================= INTRO ================= */
        .intro {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .intro-text {
            font-family: 'Playfair Display'; font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700; opacity: 0; animation: introFade 2.4s forwards ease-in-out;
        }
        @keyframes introFade {
            0% { opacity: 0; filter: blur(15px); transform: scale(0.9); }
            40% { opacity: 1; filter: blur(0px); transform: scale(1); }
            100% { opacity: 0; filter: blur(15px); transform: scale(1.1); }
        }
        .intro.hide { display: none; }

        /* ================= NAV ================= */
        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; z-index: 1000; border-bottom: 0.5px solid var(--glass-border);
        }
        header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
        
        nav { display: flex; align-items: center; gap: 25px; }
        nav a { text-decoration: none; color: var(--text); font-size: 13px; font-weight: 500; opacity: 0.7; transition: 0.3s; }
        nav a:hover { opacity: 1; }

        .theme-toggle {
            width: 48px; height: 26px; border-radius: 20px; cursor: pointer;
            position: relative; background: rgba(var(--glass-rgb), 0.8); border: 1px solid var(--glass-border);
        }
        .toggle-circle {
            width: 20px; height: 20px; background: var(--text); border-radius: 50%;
            position: absolute; top: 2px; left: 3px; transition: 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045);
            display: flex; align-items: center; justify-content: center; font-size: 11px;
        }
        body.dark .toggle-circle { left: 23px; background: #fff; color: #000; }

        /* ================= HERO: PHOTO ON RIGHT ================= */
        .hero {
            height: 100vh; display: flex; align-items: center;
            padding: 0 5% 0 10%; position: relative; gap: 40px; overflow: hidden;
        }
        .hero-content { flex: 1; z-index: 2; }
        .hero-content h2 {
            font-family: 'Playfair Display'; font-size: clamp(3.5rem, 8vw, 7rem);
            line-height: 0.9; font-weight: 700; letter-spacing: -0.05em; margin-bottom: 20px;
        }
        .hero-content p { font-size: 1.2rem; font-weight: 300; opacity: 0.6; max-width: 450px; }

        .hero-image-container {
            flex: 1; height: 85vh; border-radius: 40px; overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2); position: relative;
        }
        .hero-image-container img {
            width: 100%; height: 100%; object-fit: cover;
            /* Adjust object-position if you need to center yourself better */
            object-position: center;
        }

        /* ================= GALLERY: OPTIMIZED ================= */
        section { padding: 120px 5%; }
        .section-title { font-family: 'Playfair Display'; font-size: 48px; margin-bottom: 60px; text-align: center; }

        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 24px;
        }
        .gallery-item {
            position: relative; border-radius: 32px; overflow: hidden;
            background: #1c1c1e; height: 550px;
        }
        .gallery img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .gallery-item:hover img { transform: scale(1.05); }

        /* ================= CALENDAR & BOOKING ================= */
        .calendar-card {
            max-width: 450px; margin: 40px auto; padding: 40px;
            border-radius: 36px;
        }
        .day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .day:hover:not(.disabled) { background: var(--text); color: var(--bg); }
        .day.selected { background: var(--accent); color: #fff; font-weight: 700; }
        .day.today { border: 1.5px solid var(--accent); }

        .btn {
            display: inline-block; padding: 16px 36px; border-radius: 40px;
            background: var(--text); color: var(--bg); text-decoration: none;
            font-weight: 600; font-size: 14px; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        /* ================= MOBILE FIXES ================= */
        @media(max-width: 900px){
            .hero { flex-direction: column; text-align: center; padding: 100px 20px 0; justify-content: flex-start; }
            .hero-image-container { width: 100%; height: 50vh; order: -1; }
            .hero-content h2 { font-size: 3rem; }
            .gallery { grid-template-columns: 1fr; }
            nav { display: none; }
        }
    </style>
</head>

<body>

<div class="intro" id="intro"><div class="intro-text">Dillu Captures</div></div>

<header class="glass">
    <h1>DILLU CAPTURES</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#about">The Artist</a>
        <a href="#gallery">Works</a>
        <a href="#contact">Inquire</a>
        <div class="theme-toggle" onclick="toggleTheme()"><span class="toggle-circle"><span id="icon">☀️</span></span></div>
    </nav>
</header>

<main>
    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <h2 class="reveal">Elegance <br>Redefined.</h2>
            <p class="reveal">Capturing high-end visuals for clients who value cinematic storytelling and luxury aesthetics.</p>
            <div class="reveal" style="margin-top: 30px;">
                <a href="#contact" class="btn">Book a Session</a>
            </div>
        </div>
        <div class="hero-image-container reveal">
            <!-- YOUR PHOTO HERE -->
            <img src="Images/1776695215852.webp" alt="Dillu Captures">
        </div>
    </section>

    <!-- GALLERY SECTION -->
    <section id="gallery">
        <h2 class="section-title reveal">The Portfolio</h2>
        <div class="gallery">
            <div class="gallery-item reveal"><img src="Images/Kids/20240813111900_IMG_0814.webp" loading="lazy"></div>
            <div class="gallery-item reveal"><img src="Images/Kids/IMG_1902.webp" loading="lazy"></div>
            <div class="gallery-item reveal"><img src="Images/Maternity Shoot/IMG_4216.webp" loading="lazy"></div>
            <div class="gallery-item reveal"><img src="Images/Temples & Culture/IMG_3390.webp" loading="lazy"></div>
            <div class="gallery-item reveal"><img src="Images/Temples & Culture/IMG_20251225_195802010.webp" loading="lazy"></div>
            <div class="gallery-item reveal"><img src="Images/Maternity Shoot/20240719132714_IMG_0511.webp" loading="lazy"></div>
        </div>
    </section>

    <!-- BOOKING SECTION -->
    <section id="contact" style="text-align:center; background: rgba(var(--glass-rgb), 0.2);">
        <h2 class="section-title reveal">Schedule</h2>
        <div style="margin-bottom: 50px;" class="reveal">
            <a class="btn" style="background:#25D366; color:white;" href="https://wa.me/919700034138" target="_blank">WhatsApp</a>
            <a class="btn" style="background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color:white;" href="https://www.instagram.com/dillu_captures/" target="_blank">Instagram</a>
        </div>

        <div class="calendar-card glass reveal">
            <div class="calendar-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <button onclick="prevMonth()" style="background:none; border:none; color:var(--text); cursor:pointer; font-size:24px;">‹</button>
                <h3 id="monthYear"></h3>
                <button onclick="nextMonth()" style="background:none; border:none; color:var(--text); cursor:pointer; font-size:24px;">›</button>
            </div>
            <div class="weekdays" style="display:grid; grid-template-columns:repeat(7,1fr); font-size:11px; font-weight:700; opacity:0.3; margin-bottom:15px;">
                <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
            </div>
            <div class="days" id="days" style="display:grid; grid-template-columns:repeat(7,1fr); gap:8px;"></div>
            <div class="slots" id="slots" style="margin-top:30px; display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        </div>
    </section>
</main>

<!-- LIBRARIES -->
<script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

<script>
/* 1. LENIS SMOOTH SCROLL (High Performance Settings) */
const lenis = new Lenis({
    duration: 1.4,
    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
    smoothWheel: true,
    wheelMultiplier: 1.1,
})
function raf(time) {
    lenis.raf(time)
    requestAnimationFrame(raf)
}
requestAnimationFrame(raf)

/* 2. INTRO & REVEAL */
window.addEventListener('load', () => {
    setTimeout(() => {
        document.getElementById("intro").style.opacity = "0";
        setTimeout(() => document.getElementById("intro").classList.add("hide"), 800);
    }, 2400);
});

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('active');
            // Optimization: stop observing once revealed
            observer.unobserve(entry.target);
        }
    });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

/* 3. THEME */
function toggleTheme(){
    document.body.classList.toggle("dark");
    document.getElementById("icon").textContent = document.body.classList.contains("dark") ? "🌙" : "☀️";
}

/* 4. CALENDAR */
let currentDate = new Date();
let selectedDate = null;

function renderCalendar(){
    const daysEl = document.getElementById("days");
    const monthYear = document.getElementById("monthYear");
    daysEl.innerHTML="";
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    monthYear.innerText = currentDate.toLocaleString("default",{month:"long"})+" "+year;
    
    const firstDay = new Date(year,month,1).getDay();
    const lastDate = new Date(year,month+1,0).getDate();
    const today = new Date();

    for(let i=0; i<firstDay; i++) daysEl.innerHTML+="<div></div>";

    for(let d=1; d<=lastDate; d++){
        const date = new Date(year,month,d);
        const div = document.createElement("div");
        div.className="day";
        div.innerText=d;
        if(date < new Date(today.setHours(0,0,0,0))) div.classList.add("disabled");
        if(d===today.getDate() && month===today.getMonth()) div.classList.add("today");
        div.onclick=()=>selectDate(d,div);
        daysEl.appendChild(div);
    }
}

function selectDate(day,el){
    document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
    el.classList.add("selected");
    selectedDate = `${day} ${currentDate.toLocaleString("default",{month:"long"})}`;
    showSlots();
}

function showSlots(){
    const slots = document.getElementById("slots");
    slots.innerHTML="";
    ["Morning Slot", "Afternoon Slot", "Sunset Session"].forEach(time => {
        const s = document.createElement("div");
        s.className = "btn";
        s.style.fontSize = "12px";
        s.style.padding = "10px 20px";
        s.style.cursor = "pointer";
        s.innerText = time;
        s.onclick = () => {
            const msg = `Hi Dillu, I'm interested in booking a ${time} on ${selectedDate}.`;
            window.open(`https://wa.me/919700034138?text=${encodeURIComponent(msg)}`);
        };
        slots.appendChild(s);
    });
}

function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }

renderCalendar();
</script>

</body>
</html>
