<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#fff;
  height:200vh; /* for scroll feel */
}

/* ===== GLASS EFFECT ===== */
.glass{
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
}

/* ===== HERO (MINIMAL) ===== */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:60px;
  font-weight:500;
  letter-spacing:1px;
}

.hero p{
  opacity:0.6;
  margin-top:10px;
}

/* ===== MAC DOCK ===== */
.dock{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 18px;
  border-radius:30px;
  display:flex;
  gap:18px;
  z-index:999;
}

/* ICON STYLE */
.dock-item{
  width:50px;
  height:50px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  border-radius:15px;
  cursor:pointer;
  transition:0.2s ease;
  position:relative;
}

/* MAGNIFY EFFECT */
.dock-item:hover{
  transform:scale(1.8) translateY(-10px);
}

/* NEIGHBOR SCALE */
.dock-item:hover + .dock-item{
  transform:scale(1.4) translateY(-6px);
}
.dock-item:has(+ .dock-item:hover){
  transform:scale(1.4) translateY(-6px);
}

/* TOOLTIP */
.dock-item::after{
  content:attr(data-label);
  position:absolute;
  bottom:70px;
  background:#000;
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
  opacity:0;
  transform:translateY(10px);
  transition:0.2s;
  white-space:nowrap;
}

.dock-item:hover::after{
  opacity:1;
  transform:translateY(0);
}

/* ===== SECTIONS ===== */
section{
  padding:120px 20px;
  text-align:center;
}

h2{
  font-size:32px;
  margin-bottom:10px;
}

p{
  opacity:0.6;
}

/* ===== SMOOTH SCROLL OFFSET ===== */
html{
  scroll-behavior:smooth;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Dillu Captures</h1>
    <p>Luxury Photography Experience</p>
  </div>
</div>

<!-- SECTIONS -->
<section id="about">
  <h2>About</h2>
  <p>Professional photographer capturing timeless moments with cinematic storytelling.</p>
</section>

<section id="services">
  <h2>Services</h2>
  <p>Weddings • Portraits • Maternity • Cinematic Shoots</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Tap icons below to connect instantly</p>
</section>

<!-- MAC DOCK -->
<div class="dock glass">

  <div class="dock-item" data-label="Home" onclick="scrollToSection('top')">🏠</div>

  <div class="dock-item" data-label="About" onclick="scrollToSection('about')">👤</div>

  <div class="dock-item" data-label="Services" onclick="scrollToSection('services')">🎬</div>

  <div class="dock-item" data-label="WhatsApp"
       onclick="openWhatsApp()">💬</div>

  <div class="dock-item" data-label="Instagram"
       onclick="openInsta()">📸</div>

</div>

<script>

/* SCROLL FUNCTION */
function scrollToSection(id){
  if(id === 'top'){
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    document.getElementById(id).scrollIntoView({behavior:'smooth'});
  }
}

/* LINKS */
function openWhatsApp(){
  window.open("https://wa.me/919700034138","_blank");
}

function openInsta(){
  window.open("https://www.instagram.com/dillu_captures/","_blank");
}

</script>

</body>
</html>
