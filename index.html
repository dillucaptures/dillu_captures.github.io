<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Cinematic</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:#fff;
  font-family:Inter;
}

canvas{
  position:fixed;
  top:0;
  left:0;
}

/* TEXT */
.text{
  position:fixed;
  width:100%;
  top:40%;
  text-align:center;
  font-size:40px;
  opacity:0;
  transition:1s;
}
.text.show{ opacity:1; }

.spacer{
  height:300vh;
}
</style>
</head>

<body>

<div class="text" id="title">Dillu Captures</div>
<div class="spacer"></div>

<script>

/* ================================
   THREE JS SETUP
================================ */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ================================
   DEPTH LAYERS
================================ */
const textures = [
  "Images/Kids/IMG_1902.webp",
  "Images/Maternity Shoot/IMG_4216.webp",
  "Images/Temples & Culture/IMG_3390.webp"
];

const loader = new THREE.TextureLoader();
const planes = [];

textures.forEach((src,i)=>{
  const tex = loader.load(src);

  const geo = new THREE.PlaneGeometry(4,3);
  const mat = new THREE.MeshBasicMaterial({map:tex});

  const mesh = new THREE.Mesh(geo,mat);
  mesh.position.z = -i*3; // depth layers
  scene.add(mesh);

  planes.push(mesh);
});

/* ================================
   SCROLL → CAMERA
================================ */
let scrollY = 0;

window.addEventListener("scroll",()=>{
  scrollY = window.scrollY;
});

function animate(){
  requestAnimationFrame(animate);

  const progress = scrollY / window.innerHeight;

  /* camera movement */
  camera.position.z = 5 - progress * 6;

  /* subtle parallax */
  planes.forEach((p,i)=>{
    p.position.y = Math.sin(progress + i)*0.3;
  });

  renderer.render(scene,camera);
}
animate();

/* ================================
   AI IMAGE DETECTION
================================ */
let model;

async function loadAI(){
  model = await mobilenet.load();

  const img = new Image();
  img.src = textures[0];

  img.onload = async ()=>{
    const predictions = await model.classify(img);
    applyAIStyle(predictions);
  }
}

function applyAIStyle(predictions){
  const label = predictions[0].className;

  console.log("AI detected:", label);

  if(label.includes("person")){
    document.body.style.background = "#111";
  }
  else if(label.includes("nature")){
    document.body.style.background = "#020617";
  }
  else{
    document.body.style.background = "#000";
  }
}

loadAI();

/* ================================
   TEXT TIMING
================================ */
window.addEventListener("scroll",()=>{
  const title = document.getElementById("title");

  if(scrollY > 100){
    title.classList.add("show");
  } else {
    title.classList.remove("show");
  }
});

/* ================================
   RESIZE
================================ */
window.addEventListener("resize",()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

</script>

</body>
</html>
