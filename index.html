<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Ultra Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:Inter;
  background:#0f0f0f;
  color:#fff;
  overflow-x:hidden;
}

/* ===== INTRO CINEMATIC ===== */
.intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:40px;
  font-family:Playfair Display;
  letter-spacing:2px;
  animation:fadeOut 2s forwards 2s;
}
@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* ===== CURSOR ===== */
.cursor{
  width:25px;height:25px;
  position:fixed;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  filter:blur(8px);
  pointer-events:none;
  z-index:9999;
}

/* ===== HERO PARALLAX ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:60px;
  transform-style:preserve-3d;
}
.hero h1{
  font-size:60px;
  font-family:Playfair Display;
}

/* ===== BUTTON ===== */
.btn{
  padding:12px 24px;
  border-radius:30px;
  background:#222;
  color:#fff;
  border:none;
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  transform:scale(1.1);
}

/* ===== GALLERY ===== */
.gallery{
  column-count:3;
  padding:30px;
}
.gallery img{
  width:100%;
  margin-bottom:20px;
  border-radius:15px;
  cursor:pointer;
  transition:.3s;
}

/* ===== VIEWER ===== */
.viewer{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
}
.viewer img{
  max-width:90%;
  max-height:90%;
}

/* ===== LIGHTROOM PANEL ===== */
.editor{
  position:fixed;
  right:0;
  top:0;
  width:250px;
  height:100%;
  background:#111;
  padding:20px;
}
.editor input{
  width:100%;
}

</style>
</head>

<body>

<div class="intro">Dillu Captures</div>
<div class="cursor" id="cursor"></div>

<section class="hero">
  <h1>Luxury Visual Storytelling</h1>
</section>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
  <img id="viewerImg">
</div>

<div class="editor">
  <h3>Edit</h3>
  <label>Brightness</label>
  <input type="range" min="0.5" max="2" step="0.1" id="brightness">
  <label>Contrast</label>
  <input type="range" min="0.5" max="2" step="0.1" id="contrast">
</div>

<script>

/* ===== CURSOR ===== */
document.addEventListener("mousemove",e=>{
  const c=document.getElementById("cursor");
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
});

/* ===== PARALLAX ===== */
document.addEventListener("mousemove",e=>{
  document.querySelector(".hero").style.transform =
    `rotateY(${e.clientX/50}deg) rotateX(${-e.clientY/50}deg)`;
});

/* ===== IMAGES ===== */
const images=[
"Images/Kids/IMG_1902.webp",
"Images/Maternity Shoot/IMG_4216.webp",
"Images/Temples & Culture/IMG_3390.webp"
];

/* ===== LOAD GALLERY ===== */
const gallery=document.getElementById("gallery");

images.forEach(src=>{
  const img=document.createElement("img");
  img.src=src;

  img.onclick=()=>openViewer(src);
  gallery.appendChild(img);
});

/* ===== SWIPE VIEWER ===== */
let currentIndex=0;

function openViewer(src){
  currentIndex=images.indexOf(src);
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=src;
}

let startX=0;

document.getElementById("viewer").addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

document.getElementById("viewer").addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;

  if(startX-endX>50) next();
  if(endX-startX>50) prev();
});

function next(){
  currentIndex=(currentIndex+1)%images.length;
  viewerImg.src=images[currentIndex];
}
function prev(){
  currentIndex=(currentIndex-1+images.length)%images.length;
  viewerImg.src=images[currentIndex];
}

/* ===== AI TAGGING (REAL TFJS) ===== */
async function runAI(){
  const model = await mobilenet.load();

  document.querySelectorAll(".gallery img").forEach(async img=>{
    const predictions = await model.classify(img);
    console.log(img.src, predictions[0].className);
  });
}
runAI();

/* ===== EDITOR ===== */
const viewerImg=document.getElementById("viewerImg");

brightness.oninput=contrast.oninput=()=>{
  viewerImg.style.filter =
    `brightness(${brightness.value}) contrast(${contrast.value})`;
};

/* ===== CLOSE VIEWER ===== */
viewer.onclick=()=>viewer.style.display="none";

</script>

</body>
</html>
