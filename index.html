<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures — Cinematic</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>

/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ================= NAV ================= */
header{
  position:fixed;
  width:100%;
  top:0;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
  backdrop-filter:blur(20px);
}

header h1{
  font-size:18px;
  font-weight:500;
}

nav a{
  margin-left:25px;
  color:#aaa;
  text-decoration:none;
  font-size:14px;
}

nav a:hover{color:#fff}

/* ================= SECTIONS ================= */
.section{
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ================= HERO ================= */
.hero{
  background:#000;
}

.hero h2{
  font-size:64px;
  text-align:center;
  line-height:1.1;
}

/* ================= IMAGE STACK ================= */
.stack{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.stack img{
  position:absolute;
  width:60%;
  left:20%;
  top:20%;
  border-radius:20px;
  object-fit:cover;
  filter:blur(20px);
  transform:scale(1.2);
  opacity:0;
}

/* ================= TEXT STORY ================= */
.story-text{
  position:absolute;
  bottom:20%;
  font-size:28px;
  opacity:0;
  text-align:center;
}

/* ================= GALLERY ================= */
.gallery{
  padding:120px 40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.gallery img{
  width:100%;
  border-radius:15px;
  transition:.5s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* ================= FOOTER ================= */
footer{
  padding:80px 40px;
  text-align:center;
  color:#aaa;
}

</style>
</head>

<body>

<header>
  <h1>Dillu Captures</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
  </nav>
</header>

<!-- ================= HERO ================= -->
<section class="section hero">
  <h2 id="heroText">Capturing<br>Emotion</h2>
</section>

<!-- ================= CINEMATIC STORY ================= -->
<section class="section">

  <div class="stack">

    <!-- KIDS -->
    <img src="Images/Kids/IMG_1902.webp">
    <img src="Images/Kids/IMG_5332.webp">

    <!-- MATERNITY -->
    <img src="Images/Maternity Shoot/IMG_4216.webp">
    <img src="Images/Maternity Shoot/IMG_4363.webp">

    <!-- CULTURE -->
    <img src="Images/Temples & Culture/IMG_3390.webp">
    <img src="Images/Temples & Culture/IMG_3234.webp">

  </div>

  <div class="story-text" id="storyText">
    Every frame tells a story
  </div>

</section>

<!-- ================= GALLERY ================= -->
<section id="gallery">

  <div class="gallery">

    <!-- Kids -->
    <img src="Images/Kids/20240813111900_IMG_0814.webp">
    <img src="Images/Kids/IMG_1902.webp">
    <img src="Images/Kids/IMG_5197 (1).webp">
    <img src="Images/Kids/IMG_5332.webp">

    <!-- Maternity -->
    <img src="Images/Maternity Shoot/20240719132714_IMG_0511.webp">
    <img src="Images/Maternity Shoot/IMG_4216.webp">
    <img src="Images/Maternity Shoot/IMG_4265.webp">
    <img src="Images/Maternity Shoot/IMG_4363.webp">

    <!-- Culture -->
    <img src="Images/Temples & Culture/20230609184601_IMG_7346.webp">
    <img src="Images/Temples & Culture/20231001121437_IMG_8556.webp">
    <img src="Images/Temples & Culture/IMG_20251225_093551493.webp">
    <img src="Images/Temples & Culture/WhatsApp Image 2025-06-24 at 11.30.48 AM (1).webp">
    <img src="Images/Temples & Culture/IMG_3234.webp">
    <img src="Images/Temples & Culture/IMG_3390.webp">
    <img src="Images/Temples & Culture/IMG_3037.webp">
    <img src="Images/Temples & Culture/IMG_20251225_195802010.webp">

  </div>

</section>

<footer>
  © 2026 Dillu Captures — Cinematic Experience
</footer>

<script>

/* ================= GSAP ================= */
gsap.registerPlugin(ScrollTrigger);

/* HERO ANIMATION */
gsap.from("#heroText",{
  scale:1.5,
  opacity:0,
  duration:2,
  ease:"power3.out"
});

/* ================= IMAGE STORY ================= */
const images = document.querySelectorAll(".stack img");

images.forEach((img, i)=>{
  gsap.to(img,{
    scrollTrigger:{
      trigger:".section",
      start:`top+=${i*150} center`,
      end:`+=400`,
      scrub:true
    },
    opacity:1,
    scale:1,
    filter:"blur(0px)"
  });

  gsap.to(img,{
    scrollTrigger:{
      trigger:".section",
      start:`top+=${i*150+200} center`,
      end:`+=400`,
      scrub:true
    },
    opacity:0,
    scale:1.2,
    filter:"blur(20px)"
  });
});

/* ================= TEXT STORY ================= */
gsap.to("#storyText",{
  scrollTrigger:{
    trigger:".section",
    start:"top center",
    end:"bottom center",
    scrub:true
  },
  opacity:1,
  y:-50
});

</script>

</body>
</html>
