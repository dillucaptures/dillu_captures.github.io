<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== ROOT ===== */
:root {
  --bg:#ffffff;
  --text:#111;
  --accent:linear-gradient(135deg,#ff7a18,#ff0066,#7a00ff);
  --glass:rgba(255,255,255,0.6);
}

body.dark{
  --bg:#0f0f0f;
  --text:#f5f5f5;
  --glass:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.4s;
}

/* ===== INTRO ===== */
.intro{
  position:fixed;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  z-index:9999;
}
.intro-text{
  font-family:'Playfair Display';
  font-size:50px;
  background:var(--accent);
  -webkit-background-clip:text;
  color:transparent;
  animation:fadeUp 1.5s forwards;
}
.intro.hide{animation:fadeOut 1s forwards;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* ===== NAV ===== */
header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 60px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:1000;
}

header h1{
  font-family:'Playfair Display';
  background:var(--accent);
  -webkit-background-clip:text;
  color:transparent;
}

nav a{
  margin-left:25px;
  text-decoration:none;
  color:var(--text);
  font-size:14px;
  position:relative;
}
nav a::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:0;
  width:0;height:2px;
  background:var(--accent);
  transition:.3s;
}
nav a:hover::after{width:100%;}

/* TOGGLE */
.theme-toggle{
  width:52px;height:26px;
  border-radius:30px;
  background:var(--glass);
  margin-left:20px;
  position:relative;
  cursor:pointer;
}
.toggle-circle{
  width:20px;height:20px;
  border-radius:50%;
  position:absolute;
  top:3px;left:3px;
  background:#111;color:#fff;
  display:flex;align-items:center;justify-content:center;
  transition:.3s;
}
body.dark .toggle-circle{
  left:29px;background:#fff;color:#111;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:120px 60px;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to right,rgba(0,0,0,.6),transparent);
}
.hero::after{
  content:"";
  position:absolute;
  right:0;
  width:60%;
  height:100%;
  background:url('Images/1776695215852.webp') center/cover;
}

.hero-text{
  position:relative;
  z-index:2;
  max-width:520px;
  color:#fff;
}
.hero-text h2{
  font-family:'Playfair Display';
  font-size:56px;
}
.hero-text p{opacity:.8;margin-top:10px;}

/* ===== SECTIONS ===== */
section{padding:120px 60px;}

/* ===== ABOUT ===== */
.about{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
}
.about img{
  width:100%;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.gallery-item{
  position:relative;
  overflow:hidden;
  border-radius:18px;
  cursor:pointer;
}
.gallery img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.6s;
}
.gallery-item:hover img{
  transform:scale(1.1);
}

/* overlay shine */
.gallery-item::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);
  opacity:0;
  transition:.5s;
}
.gallery-item:hover::after{
  opacity:1;
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}
.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}
.modal.active{
  opacity:1;
  pointer-events:auto;
}

/* ===== BUTTON ===== */
.btn{
  display:inline-block;
  padding:14px 28px;
  border-radius:30px;
  background:var(--accent);
  color:#fff;
  text-decoration:none;
  margin:10px;
}

/* ===== CALENDAR ===== */
.calendar{max-width:420px;margin:40px auto;text-align:center;}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.day{
  padding:10px;
  background:var(--glass);
  border-radius:10px;
  cursor:pointer;
}
.day:hover{background:#111;color:#fff;}

/* ===== MOBILE ===== */
@media(max-width:768px){
  header{padding:15px 20px;}
  .hero{flex-direction:column;text-align:center;padding:100px 20px;}
  .hero::after{width:100%;height:50%;}
  .hero-text{margin-top:55vh;}
  .about{grid-template-columns:1fr;}
  section{padding:100px 20px;}
}

</style>
</head>

<body>

<div class="intro" id="intro">
  <div class="intro-text">Dillu Captures</div>
</div>

<header>
  <h1>Dillu Captures</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>

    <span class="theme-toggle" onclick="toggleTheme()">
      <span class="toggle-circle"><span id="icon">☀️</span></span>
    </span>
  </nav>
</header>

<section class="hero">
  <div class="hero-text">
    <h2>Capturing Timeless Moments</h2>
    <p>Luxury photography crafted with emotion.</p>
  </div>
</section>

<section id="about" class="about">
  <img src="Images/IMG_1164.webp">
  <div>
    <h2>About Me</h2>
    <p>I am a professional photographer specializing in portraits, weddings, and cinematic storytelling.</p>
  </div>
</section>

<section id="gallery">
  <h2 style="margin-bottom:30px">Gallery</h2>

  <div class="gallery">

    <!-- KIDS -->
    <div class="gallery-item"><img src="Images/Kids/20240813111900_IMG_0814.webp"></div>
    <div class="gallery-item"><img src="Images/Kids/IMG_1902.webp"></div>
    <div class="gallery-item"><img src="Images/Kids/IMG_5197 (1).webp"></div>
    <div class="gallery-item"><img src="Images/Kids/IMG_5332.webp"></div>

    <!-- MATERNITY -->
    <div class="gallery-item"><img src="Images/Maternity Shoot/20240719132714_IMG_0511.webp"></div>
    <div class="gallery-item"><img src="Images/Maternity Shoot/IMG_4216.webp"></div>
    <div class="gallery-item"><img src="Images/Maternity Shoot/IMG_4265.webp"></div>
    <div class="gallery-item"><img src="Images/Maternity Shoot/IMG_4363.webp"></div>

    <!-- CULTURE -->
    <div class="gallery-item"><img src="Images/Temples & Culture/20230609184601_IMG_7346.webp"></div>
    <div class="gallery-item"><img src="Images/Temples & Culture/20231001121437_IMG_8556.webp"></div>
    <div class="gallery-item"><img src="Images/Temples & Culture/IMG_20251225_093551493.webp"></div>
    <div class="gallery-item"><img src="Images/Temples & Culture/WhatsApp Image 2025-06-24 at 11.30.48 AM (1).webp"></div>
    <div class="gallery-item"><img src="Images/Temples & Culture/IMG_3234.webp"></div>
    <div class="gallery-item"><img src="Images/Temples & Culture/IMG_3390.webp"></div>
    <div class="gallery-item"><img src="Images/Temples & Culture/IMG_3037.webp"></div>
    <div class="gallery-item"><img src="Images/Temples & Culture/IMG_20251225_195802010.webp"></div>

  </div>
</section>

<section id="contact">
  <h2>Book a Slot</h2>

  <a class="btn" href="https://wa.me/919700034138" target="_blank">WhatsApp</a>
  <a class="btn" href="https://www.instagram.com/dillu_captures/" target="_blank">Instagram</a>

  <div class="calendar">
    <div class="days" id="days"></div>
  </div>
</section>

<!-- IMAGE MODAL -->
<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>

window.onload=()=>{
  setTimeout(()=>document.getElementById("intro").classList.add("hide"),1800);
};

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("dark");
  document.getElementById("icon").textContent =
    document.body.classList.contains("dark")?"🌙":"☀️";
}

/* CALENDAR */
let daysEl=document.getElementById("days");
for(let i=1;i<=30;i++){
  let d=document.createElement("div");
  d.className="day";
  d.innerText=i;
  daysEl.appendChild(d);
}

/* IMAGE MODAL */
const modal=document.getElementById("modal");
const modalImg=document.getElementById("modalImg");

document.querySelectorAll(".gallery img").forEach(img=>{
  img.onclick=()=>{
    modal.classList.add("active");
    modalImg.src=img.src;
  }
});

modal.onclick=()=>modal.classList.remove("active");

</script>

</body>
</html>
