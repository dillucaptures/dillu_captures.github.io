<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Inter;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== WEBGL CANVAS ===== */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* ===== SECTION ===== */
.section{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
}

/* ===== TEXT ANIMATION ===== */
.text{
  opacity:0;
  transform:translateY(50px) scale(0.95);
  transition:all 1s ease;
}
.text.show{
  opacity:1;
  transform:translateY(0) scale(1);
}

h1{
  font-family:Playfair Display;
  font-size:50px;
}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:40px;
}
.gallery img{
  width:100%;
  border-radius:12px;
  transition:.4s;
}
.gallery img:hover{
  transform:scale(1.05);
}

</style>
</head>

<body>

<!-- SCROLL STORY -->
<div class="section"><div class="text"><h1>Dillu Captures</h1></div></div>
<div class="section"><div class="text"><h1>Luxury Photography</h1></div></div>
<div class="section"><div class="text"><h1>Every Frame Matters</h1></div></div>

<!-- GALLERY -->
<div class="gallery">
  <img src="Images/Kids/IMG_1902.webp">
  <img src="Images/Kids/IMG_5332.webp">
  <img src="Images/Maternity Shoot/IMG_4216.webp">
  <img src="Images/Maternity Shoot/IMG_4265.webp">
  <img src="Images/Temples & Culture/IMG_3390.webp">
  <img src="Images/Temples & Culture/IMG_3037.webp">
</div>

<script>

/* ===== SCROLL STORY ANIMATION ===== */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("show");
    }
  });
},{threshold:0.5});

document.querySelectorAll(".text").forEach(el=>{
  observer.observe(el);
});

/* ===== THREE JS BACKGROUND ===== */
const scene = new THREE.Scene();
const camera = new THREE.Camera();
const renderer = new THREE.WebGLRenderer({alpha:true});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.PlaneGeometry(2,2);

const material = new THREE.ShaderMaterial({
  uniforms:{
    time:{value:0}
  },
  fragmentShader:`
    uniform float time;
    void main(){
      vec2 uv = gl_FragCoord.xy / vec2(800.0,600.0);
      float color = 0.5 + 0.5*sin(time + uv.x*5.0);
      gl_FragColor = vec4(vec3(color*0.2, color*0.3, color*0.5),1.0);
    }
  `
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

function animate(){
  material.uniforms.time.value += 0.01;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

/* ===== RESPONSIVE ===== */
window.addEventListener("resize",()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
