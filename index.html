<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#0b0b0b;
  color:#fff;
  overflow-x:hidden;
}

/* ===== CURSOR GLOW ===== */
.cursor{
  position:fixed;
  width:20px;height:20px;
  border-radius:50%;
  background:white;
  pointer-events:none;
  mix-blend-mode:difference;
  z-index:9999;
  transition:transform .15s ease;
}
.cursor-glow{
  position:fixed;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
  pointer-events:none;
  z-index:9998;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.hero h1{font-size:60px;}
.hero p{opacity:.6;margin-top:10px;}

/* ===== SECTIONS ===== */
section{padding:100px 20px;text-align:center;}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}
.gallery img{
  width:100%;
  border-radius:15px;
  transition:.4s;
}
.gallery img:hover{
  transform:scale(1.05);
}

/* ===== DOCK ===== */
.dock{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:18px;
  padding:14px 20px;
  border-radius:30px;
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.08);
}

/* ICON */
.dock-item{
  width:55px;height:55px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:16px;
  transition:.2s;
  cursor:pointer;
}
.dock-item img{
  width:28px;
  pointer-events:none;
}

/* ===== TOOLTIP ===== */
.dock-item::after{
  content:attr(data-label);
  position:absolute;
  bottom:70px;
  background:#000;
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
  opacity:0;
  transition:.2s;
}
.dock-item:hover::after{opacity:1;}

/* ===== ADMIN PANEL ===== */
.admin{
  position:fixed;
  top:20px;
  right:20px;
  padding:15px;
  border-radius:15px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.08);
}
.admin input{margin:5px 0;}

</style>
</head>

<body>

<div class="cursor"></div>
<div class="cursor-glow"></div>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Dillu Captures</h1>
    <p>Ultra Premium Photography Experience</p>
  </div>
</div>

<!-- GALLERY -->
<section id="gallery">
  <h2>Gallery</h2>
  <div class="gallery" id="galleryGrid"></div>
</section>

<!-- ADMIN PANEL -->
<div class="admin">
  <h4>Upload Image</h4>
  <input type="file" id="upload">
</div>

<!-- DOCK -->
<div class="dock" id="dock">

  <div class="dock-item" data-label="Home" onclick="scrollToTop()">
    <img src="https://img.icons8.com/ios-filled/50/ffffff/home.png"/>
  </div>

  <div class="dock-item" data-label="Gallery" onclick="scrollToGallery()">
    <img src="https://img.icons8.com/ios-filled/50/ffffff/picture.png"/>
  </div>

  <div class="dock-item" data-label="WhatsApp" onclick="openWA()">
    <img src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png"/>
  </div>

  <div class="dock-item" data-label="Instagram" onclick="openIG()">
    <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png"/>
  </div>

</div>

<script>

/* ===== CURSOR ===== */
const cursor=document.querySelector('.cursor');
const glow=document.querySelector('.cursor-glow');

document.addEventListener('mousemove',e=>{
  cursor.style.transform=`translate(${e.clientX}px,${e.clientY}px)`;
  glow.style.transform=`translate(${e.clientX-150}px,${e.clientY-150}px)`;
});

/* ===== DOCK MAGNETIC EFFECT ===== */
const dock=document.getElementById('dock');
const items=document.querySelectorAll('.dock-item');

dock.addEventListener('mousemove',e=>{
  items.forEach(item=>{
    const rect=item.getBoundingClientRect();
    const x=e.clientX-(rect.left+rect.width/2);
    const distance=Math.abs(x);
    const scale=Math.max(1,1.8-distance/100);
    item.style.transform=`scale(${scale}) translateY(-${scale*10}px)`;
  });
});

dock.addEventListener('mouseleave',()=>{
  items.forEach(i=>i.style.transform='scale(1)');
});

/* ===== SCROLL ===== */
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'});}
function scrollToGallery(){document.getElementById('gallery').scrollIntoView({behavior:'smooth'});}

/* ===== LINKS ===== */
function openWA(){window.open("https://wa.me/919700034138");}
function openIG(){window.open("https://instagram.com/dillu_captures");}

/* ===== GALLERY STORAGE ===== */
const grid=document.getElementById('galleryGrid');
let images=JSON.parse(localStorage.getItem('images')||'[]');

function render(){
  grid.innerHTML="";
  images.forEach(src=>{
    const img=document.createElement('img');
    img.src=src;
    grid.appendChild(img);
  });
}
render();

/* ===== UPLOAD ===== */
document.getElementById('upload').onchange=e=>{
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=function(){
    images.push(reader.result);
    localStorage.setItem('images',JSON.stringify(images));
    render();
  }
  reader.readAsDataURL(file);
};

</script>

</body>
</html>
