<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Cinematic Ultra</title>

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  font-family:Inter;
  color:#fff;
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
}

/* STORY TEXT */
.story{
  position:relative;
  height:300vh;
}

.text-block{
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-size:42px;
  opacity:0;
  transform:translateY(50px);
}
</style>
</head>

<body>

<div class="story">
  <div class="text-block" id="t1">Every Moment Has a Story</div>
  <div class="text-block" id="t2" style="top:120%">Captured with Emotion</div>
  <div class="text-block" id="t3" style="top:200%">Crafted with Light</div>
</div>

<script>

/* =========================
   THREE SETUP
========================= */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* =========================
   SHADER MATERIAL (BLUR)
========================= */
const material = new THREE.ShaderMaterial({
  uniforms:{
    texture1:{value:null},
    focus:{value:0.0}
  },
  vertexShader:`
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader:`
    uniform sampler2D texture1;
    uniform float focus;
    varying vec2 vUv;

    void main(){
      float blur = abs(vUv.y - focus) * 8.0;

      vec4 color = vec4(0.0);
      for(float x=-2.0;x<=2.0;x++){
        for(float y=-2.0;y<=2.0;y++){
          vec2 offset = vec2(x,y)*0.002*blur;
          color += texture2D(texture1, vUv + offset);
        }
      }
      color /= 25.0;

      gl_FragColor = color;
    }
  `
});

/* =========================
   IMAGE
========================= */
const loader = new THREE.TextureLoader();
const tex = loader.load("Images/Kids/IMG_1902.webp");

material.uniforms.texture1.value = tex;

const mesh = new THREE.Mesh(
  new THREE.PlaneGeometry(5,3),
  material
);

scene.add(mesh);

/* =========================
   GSAP SCROLL
========================= */
gsap.registerPlugin(ScrollTrigger);

gsap.to(material.uniforms.focus,{
  value:1,
  scrollTrigger:{
    trigger:".story",
    start:"top top",
    end:"bottom bottom",
    scrub:true
  }
});

/* =========================
   TEXT ANIMATION
========================= */
gsap.utils.toArray(".text-block").forEach((el,i)=>{

  gsap.to(el,{
    opacity:1,
    y:0,
    scrollTrigger:{
      trigger:el,
      start:"top 80%",
      end:"top 40%",
      scrub:true
    }
  });

});

/* =========================
   RENDER LOOP
========================= */
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

/* =========================
   RESIZE
========================= */
window.addEventListener("resize",()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

</script>

</body>
</html>
