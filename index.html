<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Cinematic</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{
  margin:0;
  overflow-x:hidden;
  background:#000;
  color:#fff;
  font-family:Inter;
}

canvas{
  position:fixed;
  top:0;
  left:0;
}

/* TEXT */
.text{
  position:fixed;
  width:100%;
  top:40%;
  text-align:center;
  font-size:42px;
  opacity:0;
  transition:1s;
}
.text.show{ opacity:1; }

.spacer{
  height:500vh;
}
</style>
</head>

<body>

<div class="text" id="title">Dillu Captures</div>
<div class="spacer"></div>

<script>

/* ================================
   THREE JS SETUP
================================ */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ================================
   ALL YOUR IMAGES
================================ */
const textures = [

/* Kids */
"Images/Kids/20240813111900_IMG_0814.webp",
"Images/Kids/IMG_1902.webp",
"Images/Kids/IMG_5197 (1).webp",
"Images/Kids/IMG_5332.webp",

/* Maternity */
"Images/Maternity Shoot/20240719132714_IMG_0511.webp",
"Images/Maternity Shoot/IMG_4216.webp",
"Images/Maternity Shoot/IMG_4265.webp",
"Images/Maternity Shoot/IMG_4363.webp",

/* Culture */
"Images/Temples & Culture/20230609184601_IMG_7346.webp",
"Images/Temples & Culture/20231001121437_IMG_8556.webp",
"Images/Temples & Culture/IMG_20251225_093551493.webp",
"Images/Temples & Culture/WhatsApp Image 2025-06-24 at 11.30.48 AM (1).webp",
"Images/Temples & Culture/IMG_3234.webp",
"Images/Temples & Culture/IMG_3390.webp",
"Images/Temples & Culture/IMG_3037.webp",
"Images/Temples & Culture/IMG_20251225_195802010.webp"

];

const loader = new THREE.TextureLoader();
const planes = [];

/* ================================
   CREATE DEPTH STACK
================================ */
textures.forEach((src,i)=>{
  const tex = loader.load(src);

  const geo = new THREE.PlaneGeometry(4,3);
  const mat = new THREE.MeshBasicMaterial({
    map:tex,
    transparent:true,
    opacity:0.9
  });

  const mesh = new THREE.Mesh(geo,mat);

  /* SPREAD IN 3D SPACE */
  mesh.position.z = -i * 2.5;
  mesh.position.x = (Math.random()-0.5)*2;
  mesh.position.y = (Math.random()-0.5)*2;

  scene.add(mesh);
  planes.push(mesh);
});

/* ================================
   SCROLL → CAMERA
================================ */
let scrollY = 0;

window.addEventListener("scroll",()=>{
  scrollY = window.scrollY;
});

function animate(){
  requestAnimationFrame(animate);

  const progress = scrollY / window.innerHeight;

  /* CAMERA TRAVEL */
  camera.position.z = 6 - progress * (textures.length * 2);

  /* FLOATING MOTION */
  planes.forEach((p,i)=>{
    p.position.y += Math.sin(progress + i)*0.002;
    p.rotation.y = Math.sin(progress + i) * 0.1;
  });

  renderer.render(scene,camera);
}
animate();

/* ================================
   AI IMAGE DETECTION
================================ */
let model;

async function loadAI(){
  model = await mobilenet.load();

  const img = new Image();
  img.src = textures[0];

  img.onload = async ()=>{
    const predictions = await model.classify(img);
    applyAIStyle(predictions);
  }
}

function applyAIStyle(predictions){
  const label = predictions[0].className;

  console.log("AI detected:", label);

  if(label.includes("person")){
    document.body.style.background = "#111";
  }
  else if(label.includes("temple") || label.includes("architecture")){
    document.body.style.background = "#020617";
  }
  else{
    document.body.style.background = "#000";
  }
}

loadAI();

/* ================================
   TEXT TIMING
================================ */
window.addEventListener("scroll",()=>{
  const title = document.getElementById("title");

  if(scrollY > 150){
    title.classList.add("show");
  } else {
    title.classList.remove("show");
  }
});

/* ================================
   RESIZE
================================ */
window.addEventListener("resize",()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

</script>

</body>
</html>
