<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= THEME ================= */
:root {
  --bg: #ffffff;
  --text: #111;
  --glass: rgba(255,255,255,0.6);
}
body.dark {
  --bg: #0f0f0f;
  --text: #f5f5f5;
  --glass: rgba(255,255,255,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.4s;
}

/* INTRO */
.intro {
  position:fixed;
  width:100%;
  height:100%;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.intro-text {
  font-family:'Playfair Display';
  font-size:42px;
  opacity:0;
  transform:translateY(30px);
  animation:introText 1.5s forwards;
}
@keyframes introText {
  to {opacity:1; transform:translateY(0);}
}
.intro.hide {
  animation:fadeOut 1.2s forwards;
}
@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}

/* NAV */
header {
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:18px 60px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:1000;
}
header h1 { font-family:'Playfair Display'; }

nav a {
  margin-left:25px;
  text-decoration:none;
  color:var(--text);
  font-size:14px;
}

/* TOGGLE */
.theme-toggle {
  width:52px;
  height:26px;
  margin-left:20px;
  border-radius:30px;
  background:var(--glass);
  position:relative;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
}
.toggle-circle {
  width:20px;
  height:20px;
  border-radius:50%;
  background:#111;
  position:absolute;
  left:3px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:11px;
  color:#fff;
  transition:0.3s ease;
}
body.dark .toggle-circle {
  left:29px;
  background:#fff;
  color:#111;
}

/* HERO */
.hero {
  display:flex;
  align-items:center;
  min-height:100vh;
  padding:120px 60px;
  position:relative;
}
.hero::after {
  content:"";
  position:absolute;
  right:0;
  width:50%;
  height:100%;
  background:url('Images/1776695215852.webp') center/cover;
}
.hero-text {
  max-width:500px;
}
.hero-text h2 {
  font-family:'Playfair Display';
  font-size:48px;
}

/* SECTIONS */
section { padding:120px 60px; }

.about {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}
.about img {
  width:100%;
  border-radius:20px;
}

/* 🔥 INSTAGRAM STYLE GALLERY */
.gallery {
  column-count:3;
  column-gap:15px;
}
.gallery img {
  width:100%;
  margin-bottom:15px;
  border-radius:16px;
  break-inside:avoid;
  cursor:pointer;

  opacity:0;
  transform:translateY(40px);
  transition: all 0.8s ease, transform 0.4s ease;
}
.gallery img:hover {
  transform:scale(1.05);
  filter:brightness(1.05);
}

/* Fade in active */
.fade-in {
  opacity:1 !important;
  transform:translateY(0) !important;
}

/* Responsive */
@media(max-width:900px){
  .gallery { column-count:2; }
}
@media(max-width:500px){
  .gallery { column-count:1; }
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:14px 28px;
  border-radius:30px;
  background:var(--glass);
  text-decoration:none;
  color:var(--text);
  margin:10px;
}

/* MOBILE */
@media(max-width:768px){
  header { padding:15px 20px; }
  .hero { flex-direction:column; text-align:center; padding:100px 20px; }
  .hero::after { width:100%; height:50%; }
  .hero-text { margin-top:55vh; }
  .about { grid-template-columns:1fr; }
  section { padding:100px 20px; }
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="intro-text">Dillu Captures</div>
</div>

<header>
  <h1>Dillu Captures</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>

    <span class="theme-toggle" onclick="toggleTheme()">
      <span class="toggle-circle">
        <span id="icon">☀️</span>
      </span>
    </span>
  </nav>
</header>

<section class="hero">
  <div class="hero-text">
    <h2>Capturing Timeless Moments</h2>
    <p>Luxury photography crafted with emotion.</p>
  </div>
</section>

<section id="about" class="about">
  <img src="Images/IMG_1164.webp">
  <div>
    <h2>About Me</h2>
    <p>Professional photographer specializing in cinematic storytelling.</p>
  </div>
</section>

<section id="gallery">
  <h2 style="margin-bottom:30px">Gallery</h2>
  <div class="gallery">
    <img src="Images/Kids/20240813111900_IMG_0814.webp">
    <img src="Images/Kids/IMG_1902.webp">
    <img src="Images/Kids/IMG_5197 (1).webp">
    <img src="Images/Kids/IMG_5332.webp">
    <img src="Images/Maternity Shoot/20240719132714_IMG_0511.webp">
    <img src="Images/Maternity Shoot/IMG_4216.webp">
    <img src="Images/Maternity Shoot/IMG_4265.webp">
    <img src="Images/Maternity Shoot/IMG_4363.webp">
  </div>
</section>

<section>
  <h2>Book a Shoot</h2>
  <a class="btn" href="https://wa.me/919700034138" target="_blank">WhatsApp</a>
  <a class="btn" href="https://instagram.com" target="_blank">Instagram</a>
</section>

<script>

/* INTRO */
window.onload = () => {
  setTimeout(()=> document.getElementById("intro").classList.add("hide"),1800);
};

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("dark");
  document.getElementById("icon").textContent =
    document.body.classList.contains("dark") ? "🌙" : "☀️";
}

/* 🔥 SCROLL ANIMATION */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("fade-in");
    }
  });
}, { threshold: 0.2 });

document.querySelectorAll(".gallery img").forEach((img, index) => {
  observer.observe(img);
  img.style.transitionDelay = (index * 0.05) + "s";
});

</script>

</body>
</html>
