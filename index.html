<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Dillu Captures | Luxury Photography</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --glass-rgb: 255, 255, 255;
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent: #0071e3;
            --ios-blur: blur(30px) saturate(200%) brightness(1.1);
        }

        body.dark {
            --bg: #000000;
            --text: #ffffff;
            --glass-rgb: 28, 28, 30;
            --glass-border: rgba(255, 255, 255, 0.15);
            --ios-blur: blur(30px) saturate(180%) brightness(0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .glass {
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            background: rgba(var(--glass-rgb), 0.6);
            border: 1px solid var(--glass-border);
        }

        /* HEADER & NAV */
        header {
            position: fixed; top: 0; width: 100%; height: 75px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; z-index: 1000; border-bottom: 0.5px solid var(--glass-border);
        }
        header h1 { font-family: 'Cinzel', serif; font-size: 18px; letter-spacing: 0.25em; }
        nav { display: flex; align-items: center; gap: 30px; }
        nav a { text-decoration: none; color: var(--text); font-size: 12px; font-weight: 500; text-transform: uppercase; opacity: 0.6; }

        /* AUTH CARD STYLES */
        .login-card { 
            position: relative; z-index: 1; width: 100%; max-width: 450px; 
            padding: 50px; border-radius: 40px; margin: 40px auto;
        }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; opacity: 0.5; }
        .input-group input { 
            width: 100%; padding: 15px 20px; border-radius: 15px; 
            background: rgba(var(--glass-rgb), 0.05); border: 1px solid var(--glass-border); 
            color: var(--text); outline: none; 
        }
        .btn-login { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            background: var(--text); color: var(--bg); font-weight: 600; cursor: pointer;
        }

        /* GALLERY & EXCLUSIVE SECTION */
        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; padding: 20px 5%;
        }
        .gallery-item { border-radius: 20px; overflow: hidden; height: 400px; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 1s; }
        .gallery-item:hover img { transform: scale(1.1); }

        #exclusive-access {
            padding: 100px 5%;
            background: radial-gradient(circle at center, rgba(0,113,227,0.08) 0%, transparent 70%);
            text-align: center;
        }

        /* MODAL FOR FORGOT PASSWORD */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal.active { display: flex; }

        @media(max-width: 1000px){
            nav { display: none; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>

<header class="glass">
    <h1>DILLU CAPTURES</h1>
    <nav id="mainNav">
        <a href="#">Home</a>
        <a href="#about">The Artist</a>
        <a href="#gallery">Works</a>
        <a href="#exclusive-access">Exclusive</a>
        <a href="#contact">Book</a>
        <div onclick="toggleTheme()" style="cursor:pointer">☀️</div>
    </nav>
</header>

<main style="padding-top: 100px;">
    <section id="gallery">
        <h2 style="text-align:center; font-family:'Playfair Display'; font-size: 3rem; margin-bottom: 40px;">Works</h2>
        <div class="gallery">
            <div class="gallery-item reveal" onclick="openLightbox(this)"><img src="Images/Kids/20240813111900_IMG_0814.webp"></div>
            <div class="gallery-item reveal" onclick="openLightbox(this)"><img src="Images/Maternity Shoot/IMG_4216.webp"></div>
            <div class="gallery-item reveal" onclick="openLightbox(this)"><img src="Images/Temples & Culture/IMG_3234.webp"></div>
        </div>
    </section>

    <section id="exclusive-access">
        <div class="reveal">
            <h3 style="font-family:'Cinzel'; letter-spacing: 0.3em; font-size: 0.8rem; opacity: 0.6;">For More Exclusive</h3>
            <h2 style="font-family:'Playfair Display'; font-size: 2.5rem; margin: 15px 0 40px;">Unlock Your Private Collection</h2>
        </div>

        <div class="login-card glass reveal">
            <form id="exclusiveAuthForm">
                <div class="input-group">
                    <label>Mobile Number or Email</label>
                    <input type="text" id="exclusiveIdentifier" placeholder="+91 00000 00000" required>
                </div>
                <div class="input-group">
                    <label>Access Key (Password)</label>
                    <input type="password" id="exclusivePassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Enter Private Studio</button>
            </form>
            <div style="margin-top: 20px; font-size: 11px; opacity: 0.6;">
                <p>Request access via <a href="#" onclick="openForgotModal()" style="color:var(--accent); text-decoration:none;">Forgot Access Key?</a></p>
            </div>
        </div>
    </section>
</main>

<div id="forgotModal" class="modal">
    <div class="login-card glass" style="max-width: 400px;">
        <h2 style="font-family:'Playfair Display'; margin-bottom: 20px;">Reset Access</h2>
        <p style="font-size: 13px; margin-bottom: 20px; opacity: 0.7;">Enter your registered email to receive a password reset link.</p>
        <div class="input-group">
            <input type="email" id="resetEmail" placeholder="your-email@example.com">
        </div>
        <button class="btn-login" onclick="handleReset()">Send Link</button>
        <button onclick="closeForgotModal()" style="background:none; border:none; color:var(--text); margin-top:15px; cursor:pointer; opacity:0.5;">Cancel</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7_qvAe4C3lqikSgbLKSwrw3xvCh8XOx4",
        authDomain: "dillu-captures07.firebaseapp.com",
        projectId: "dillu-captures07",
        storageBucket: "dillu-captures07.firebasestorage.app",
        messagingSenderId: "710377587336",
        appId: "1:710377587336:web:9a8abc278a28bc2f9d953d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Global Reset Function
    window.handleReset = async () => {
        const email = document.getElementById('resetEmail').value;
        if(!email) return alert("Please enter your email.");
        try {
            await sendPasswordResetEmail(auth, email);
            alert("Reset link sent to your email!");
            closeForgotModal();
        } catch (e) { alert(e.message); }
    };

    // Exclusive Auth Form
    document.getElementById('exclusiveAuthForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('exclusiveIdentifier').value;
        const pw = document.getElementById('exclusivePassword').value;
        
        // Basic Logic: If it looks like a number, handle as mobile (requires Firebase Phone Auth setup)
        // For now, we attempt standard email sign-in
        try {
            await signInWithEmailAndPassword(auth, id.includes('@') ? id : `${id}@dillu.com`, pw);
            window.location.href = "private-gallery.html";
        } catch (err) {
            alert("Invalid credentials. Please contact the artist for access.");
        }
    });
</script>

<script>
    function openForgotModal() { document.getElementById('forgotModal').classList.add('active'); }
    function closeForgotModal() { document.getElementById('forgotModal').classList.remove('active'); }

    function toggleTheme() {
        document.body.classList.toggle('dark');
    }

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('active');
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
