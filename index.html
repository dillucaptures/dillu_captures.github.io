<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

/* ===== NAV ===== */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.4);
}

header h1{
  font-weight:500;
  font-size:18px;
}

nav a{
  color:#aaa;
  text-decoration:none;
  margin-left:20px;
  font-size:14px;
}

/* ===== HERO ===== */
.hero{
  background:url('Images/1776695215852.webp') center/cover no-repeat;
}

.hero h2{
  font-size:64px;
  font-weight:600;
}

/* ===== IMAGE SECTIONS ===== */
.panel{
  background-size:cover;
  background-position:center;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,0.3),#000);
}

.text{
  position:relative;
  z-index:2;
  max-width:700px;
}

.text h2{
  font-size:48px;
  margin-bottom:10px;
}

.text p{
  font-size:18px;
  color:#ccc;
}

/* ===== GALLERY GRID ===== */
.gallery{
  padding:100px 40px;
  background:#000;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.grid img{
  width:100%;
  border-radius:16px;
  transition:.5s;
}

.grid img:hover{
  transform:scale(1.05);
}

/* ===== FOOTER ===== */
footer{
  padding:80px 20px;
  text-align:center;
  color:#888;
}

/* MOBILE */
@media(max-width:768px){
  .hero h2{ font-size:36px; }
  .text h2{ font-size:28px; }
}

</style>
</head>

<body>

<header>
  <h1>Dillu Captures</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Capture Life<br>Beautifully</h2>
</section>

<!-- STORY PANELS -->
<section class="panel" style="background-image:url('Images/Kids/IMG_1902.webp')">
  <div class="overlay"></div>
  <div class="text">
    <h2>Pure Moments</h2>
    <p>Every child tells a story of joy and innocence.</p>
  </div>
</section>

<section class="panel" style="background-image:url('Images/Maternity Shoot/IMG_4216.webp')">
  <div class="overlay"></div>
  <div class="text">
    <h2>Timeless Love</h2>
    <p>Capturing the beauty of motherhood.</p>
  </div>
</section>

<section class="panel" style="background-image:url('Images/Temples & Culture/IMG_3390.webp')">
  <div class="overlay"></div>
  <div class="text">
    <h2>Culture & Soul</h2>
    <p>Where tradition meets visual storytelling.</p>
  </div>
</section>

<!-- GALLERY -->
<section class="gallery" id="gallery">
  <h2 style="text-align:center;margin-bottom:40px;">Gallery</h2>

  <div class="grid">
    <img src="Images/Kids/20240813111900_IMG_0814.webp">
    <img src="Images/Kids/IMG_1902.webp">
    <img src="Images/Kids/IMG_5197 (1).webp">
    <img src="Images/Kids/IMG_5332.webp">

    <img src="Images/Maternity Shoot/IMG_4216.webp">
    <img src="Images/Maternity Shoot/IMG_4265.webp">
    <img src="Images/Maternity Shoot/IMG_4363.webp">

    <img src="Images/Temples & Culture/IMG_3234.webp">
    <img src="Images/Temples & Culture/IMG_3390.webp">
    <img src="Images/Temples & Culture/IMG_3037.webp">
  </div>
</section>

<!-- FOOTER -->
<footer id="contact">
  <p>© 2026 Dillu Captures</p>
</footer>

<script>

/* GSAP */
gsap.registerPlugin(ScrollTrigger);

/* HERO TEXT */
gsap.from(".hero h2",{
  opacity:0,
  y:80,
  duration:1.5
});

/* PANEL ANIMATION */
gsap.utils.toArray(".panel").forEach(panel=>{
  gsap.from(panel.querySelector(".text"),{
    opacity:0,
    y:80,
    scrollTrigger:{
      trigger:panel,
      start:"top 70%",
      scrub:true
    }
  });
});

/* PARALLAX */
gsap.utils.toArray(".panel").forEach(panel=>{
  gsap.to(panel,{
    backgroundPosition:"50% 60%",
    ease:"none",
    scrollTrigger:{
      trigger:panel,
      scrub:true
    }
  });
});

</script>

</body>
</html>
