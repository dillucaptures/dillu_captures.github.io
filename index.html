<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Inter;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-family:Playfair Display;
  font-size:52px;
  opacity:0;
  transform:translateY(40px);
  animation:fadeUp 1s ease forwards;
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:8px;
  padding:10px;
}

.gallery img{
  width:100%;
  border-radius:12px;
  cursor:pointer;
  transition:.4s;
}

/* ===== VIEWER ===== */
.viewer{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.viewer img{
  max-width:100%;
  max-height:100%;
  transition:transform .3s ease;
}

/* ===== GLASS UI ===== */
.topbar{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.08);
  padding:10px 20px;
  border-radius:20px;
  z-index:10;
}

</style>
</head>

<body>

<div class="hero">
  <h1>Dillu Captures</h1>
</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
  <div class="topbar">Swipe • Tap • Drag</div>
  <img id="viewerImg">
</div>

<script>

/* ===== IMAGES ===== */
const images=[
"Images/Kids/IMG_1902.webp",
"Images/Kids/IMG_5332.webp",
"Images/Maternity Shoot/IMG_4216.webp",
"Images/Maternity Shoot/IMG_4265.webp",
"Images/Temples & Culture/IMG_3390.webp",
"Images/Temples & Culture/IMG_3037.webp"
];

const gallery=document.getElementById("gallery");

/* ===== LOAD ===== */
images.forEach((src,i)=>{
  const img=document.createElement("img");
  img.src=src;
  img.onclick=()=>openViewer(i);
  gallery.appendChild(img);
});

/* ===== VIEWER ===== */
let current=0;
const viewer=document.getElementById("viewer");
const viewerImg=document.getElementById("viewerImg");

function openViewer(i){
  current=i;
  viewer.style.display="flex";
  update();
}

function update(){
  viewerImg.src=images[current];
}

/* ===== TOUCH PHYSICS ===== */
let startX=0, currentX=0, isDragging=false;

viewer.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  isDragging=true;
});

viewer.addEventListener("touchmove",e=>{
  if(!isDragging) return;
  currentX=e.touches[0].clientX;
  let dx=currentX-startX;

  viewerImg.style.transform=`translateX(${dx}px) scale(0.95)`;
});

viewer.addEventListener("touchend",()=>{
  let dx=currentX-startX;

  if(dx<-50) next();
  else if(dx>50) prev();

  viewerImg.style.transform="";
  isDragging=false;
});

function next(){
  current=(current+1)%images.length;
  update();
}
function prev(){
  current=(current-1+images.length)%images.length;
  update();
}

/* ===== TAP CLOSE ===== */
viewer.addEventListener("click",()=>{
  viewer.style.display="none";
});

/* ===== KEYBOARD ===== */
document.addEventListener("keydown",e=>{
  if(viewer.style.display==="flex"){
    if(e.key==="ArrowRight") next();
    if(e.key==="ArrowLeft") prev();
    if(e.key==="Escape") viewer.style.display="none";
  }
});

</script>

</body>
</html>
