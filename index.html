<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillu Captures Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
:root{
  --bg:#0f0f0f;
  --text:#fff;
  --glass:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ===== CURSOR GLOW ===== */
.cursor{
  width:20px;
  height:20px;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  background:rgba(255,255,255,0.3);
  filter:blur(10px);
  z-index:9999;
}

/* ===== HEADER ===== */
header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:1000;
}

nav a{
  margin-left:20px;
  color:#fff;
  text-decoration:none;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 60px;
}

.hero h1{
  font-size:60px;
  font-family:Playfair Display;
  opacity:0;
  transform:translateY(40px);
  animation:fadeUp 1s forwards;
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

/* ===== FILTER TABS ===== */
.filters{
  text-align:center;
  margin:40px 0;
}

.filters button{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:var(--glass);
  color:#fff;
  cursor:pointer;
  transition:.3s;
}
.filters button:hover{
  transform:scale(1.1);
}

/* ===== GALLERY ===== */
.gallery{
  column-count:3;
  column-gap:20px;
  padding:40px;
}

.gallery img{
  width:100%;
  margin-bottom:20px;
  border-radius:15px;
  cursor:pointer;
  transition:.4s;
  filter:blur(10px);
}
.gallery img.loaded{
  filter:blur(0);
}
.gallery img:hover{
  transform:scale(1.03);
}

/* ===== VIEWER ===== */
.viewer{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
}
.viewer img{
  max-width:90%;
  max-height:90%;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .gallery{column-count:1;}
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<header>
  <h2>Dillu Captures</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
  </nav>
</header>

<section class="hero">
  <h1>Capturing Timeless Luxury</h1>
</section>

<div class="filters" id="filters"></div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

<script>

/* ===== CURSOR ===== */
document.addEventListener("mousemove", e=>{
  const c=document.getElementById("cursor");
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
});

/* ===== IMAGE DATA ===== */
const images = [
"Images/Kids/IMG_1902.webp",
"Images/Kids/IMG_5332.webp",
"Images/Maternity Shoot/IMG_4216.webp",
"Images/Maternity Shoot/IMG_4265.webp",
"Images/Temples & Culture/IMG_3390.webp",
"Images/Temples & Culture/IMG_3037.webp"
];

/* ===== AI CATEGORY DETECTION ===== */
function detectCategory(path){
  path=path.toLowerCase();

  if(path.includes("kids")) return "Kids";
  if(path.includes("maternity")) return "Maternity";
  if(path.includes("culture")) return "Culture";
  return "Other";
}

const categorized = {};

images.forEach(img=>{
  const cat = detectCategory(img);
  if(!categorized[cat]) categorized[cat]=[];
  categorized[cat].push(img);
});

/* ===== CREATE FILTER BUTTONS ===== */
const filtersDiv = document.getElementById("filters");

Object.keys(categorized).forEach(cat=>{
  const btn=document.createElement("button");
  btn.innerText=cat;
  btn.onclick=()=>loadGallery(cat);
  filtersDiv.appendChild(btn);
});

/* ===== LOAD GALLERY ===== */
function loadGallery(category){
  const gallery=document.getElementById("gallery");
  gallery.innerHTML="";

  categorized[category].forEach(src=>{
    const img=document.createElement("img");
    img.dataset.src=src;

    img.onclick=()=>openViewer(src);

    img.onload=()=>img.classList.add("loaded");

    observer.observe(img);
    gallery.appendChild(img);
  });
}

/* ===== LAZY LOAD ===== */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const img = entry.target;
      img.src = img.dataset.src;
      observer.unobserve(img);
    }
  });
});

/* ===== VIEWER ===== */
function openViewer(src){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=src;
}
function closeViewer(){
  document.getElementById("viewer").style.display="none";
}

/* INIT */
loadGallery(Object.keys(categorized)[0]);

</script>

</body>
</html>
