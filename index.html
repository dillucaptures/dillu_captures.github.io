<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dillu Captures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root {
  --bg:#ffffff;
  --text:#111;
  --glass:rgba(255,255,255,0.6);
  --accent:#c9a96e;
}

body.dark {
  --bg:#0f0f0f;
  --text:#f5f5f5;
  --glass:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter';
  background:var(--bg);
  color:var(--text);
  transition:.4s;
}

/* ================= HEADER ================= */
header{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:18px 60px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:1000;
}
header h1{font-family:'Playfair Display'}

nav a{
  margin-left:25px;
  text-decoration:none;
  color:var(--text);
}

/* ================= HERO ================= */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 60px;
  overflow:hidden;
}

/* IMAGE */
.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Images/1776695215852.webp') center/cover no-repeat;
  z-index:-2;
  transform:scale(1.1);
  animation:zoomHero 12s infinite alternate ease-in-out;
}

@keyframes zoomHero{
  from{transform:scale(1.1)}
  to{transform:scale(1.2)}
}

/* DARK OVERLAY */
.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,rgba(0,0,0,0.7),transparent);
  z-index:-1;
}

.hero-text{
  color:#fff;
  max-width:500px;
  animation:fadeUp 1.5s ease;
}

.hero-text h2{
  font-family:'Playfair Display';
  font-size:52px;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px)}
  to{opacity:1; transform:translateY(0)}
}

/* ================= SECTIONS ================= */
section{padding:120px 60px}

/* ================= GALLERY ================= */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* CARD */
.gallery img{
  width:100%;
  border-radius:18px;
  cursor:pointer;
  transition:.5s;
}

/* HOVER EFFECT */
.gallery img:hover{
  transform:scale(1.05);
  filter:brightness(0.8);
}

/* ================= POPUP ================= */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
  z-index:2000;
}

.popup.active{
  opacity:1;
  pointer-events:all;
}

.popup img{
  max-width:90%;
  max-height:85%;
  border-radius:20px;
  animation:zoomIn .4s ease;
}

@keyframes zoomIn{
  from{transform:scale(.8);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* CLOSE BUTTON */
.close-btn{
  position:absolute;
  top:30px;
  right:40px;
  font-size:30px;
  color:#fff;
  cursor:pointer;
}

/* ================= ABOUT ================= */
.about{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}
.about img{
  width:100%;
  border-radius:20px;
}

/* ================= BUTTON ================= */
.btn{
  padding:14px 28px;
  border-radius:30px;
  background:var(--glass);
  text-decoration:none;
  color:var(--text);
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  header{padding:15px 20px}
  section{padding:100px 20px}
  .hero{padding:0 20px}
  .about{grid-template-columns:1fr}
}

</style>
</head>

<body>

<header>
  <h1>Dillu Captures</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h2>Capturing Timeless Moments</h2>
    <p>Luxury photography crafted with emotion.</p>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2 style="margin-bottom:30px">Gallery</h2>

  <div class="gallery">
    <img src="Images/Kids/20240813111900_IMG_0814.webp">
    <img src="Images/Kids/IMG_1902.webp">
    <img src="Images/Kids/IMG_5197 (1).webp">
    <img src="Images/Kids/IMG_5332.webp">
    <img src="Images/Maternity Shoot/20240719132714_IMG_0511.webp">
    <img src="Images/Maternity Shoot/IMG_4216.webp">
    <img src="Images/Maternity Shoot/IMG_4265.webp">
    <img src="Images/Maternity Shoot/IMG_4363.webp">
    <img src="Images/Temples & Culture/20230609184601_IMG_7346.webp">
    <img src="Images/Temples & Culture/20231001121437_IMG_8556.webp">
  </div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <span class="close-btn" onclick="closePopup()">✕</span>
  <img id="popup-img">
</div>

<script>

/* ================= POPUP ================= */
const images = document.querySelectorAll(".gallery img");
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popup-img");

images.forEach(img=>{
  img.addEventListener("click",()=>{
    popup.classList.add("active");
    popupImg.src = img.src;
  });
});

function closePopup(){
  popup.classList.remove("active");
}

/* CLOSE ON OUTSIDE CLICK */
popup.addEventListener("click",(e)=>{
  if(e.target !== popupImg){
    closePopup();
  }
});

/* ESC KEY */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Escape"){
    closePopup();
  }
});

</script>

</body>
</html>
